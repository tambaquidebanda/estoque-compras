<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Recebimento — Tambaqui de Banda</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1a1f2e;
      --card:    #242938;
      --borda:   #2e3548;
      --verde:   #2EC4B6;
      --laranja: #FF6B35;
      --txt:     #e8eaf0;
      --txt2:    #8892a4;
      --danger:  #e74c3c;
      --warn:    #f39c12;
    }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
    }

    /* ── TELAS ── */
    #tela-login,
    #tela-lista,
    #tela-pedido { display: none; flex-direction: column; min-height: 100dvh; }
    #tela-login { align-items: center; justify-content: center; padding: 1.5rem; }

    /* ── LOGIN ── */
    .login-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 380px;
    }
    .login-logo { text-align: center; margin-bottom: 1.5rem; }
    .login-logo img { max-width: 160px; }
    .login-logo h2 { font-size: 1.1rem; color: var(--txt2); margin-top: .5rem; }
    .login-label { display: block; font-size: .8rem; color: var(--txt2); margin-bottom: .4rem; font-weight: 500; }
    input[type=email], input[type=password] {
      width: 100%; background: var(--bg); border: 1px solid var(--borda);
      border-radius: 10px; color: var(--txt); font-size: 1rem;
      padding: .75rem 1rem; margin-bottom: 1rem; outline: none; -webkit-appearance: none;
    }
    input[type=email]:focus, input[type=password]:focus { border-color: var(--verde); }
    .btn-entrar {
      width: 100%; background: var(--verde); color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600; padding: .85rem; cursor: pointer;
    }
    .btn-entrar:disabled { opacity: .5; }
    .login-erro { color: #ff6b6b; font-size: .85rem; margin-top: .5rem; text-align: center; }

    /* ── CABEÇALHO ── */
    .cabecalho {
      background: var(--card);
      border-bottom: 1px solid var(--borda);
      padding: .75rem 1rem;
      position: sticky; top: 0; z-index: 50;
    }
    .cab-row { display: flex; align-items: center; gap: .75rem; }
    .cab-row img { height: 32px; }
    .cab-row h1 { font-size: 1rem; font-weight: 700; flex: 1; }
    .btn-sair { background: none; border: 1px solid var(--borda); color: var(--txt2); border-radius: 8px; padding: .3rem .7rem; font-size: .8rem; cursor: pointer; }
    .btn-voltar { background: none; border: none; color: var(--verde); font-size: .9rem; font-weight: 600; cursor: pointer; padding: 0; }

    /* ── LISTA ── */
    .lista-body { padding: 1rem; padding-bottom: 5rem; flex: 1; }
    .lista-vazia { text-align: center; color: var(--txt2); padding: 3rem 1rem; }
    .lista-vazia .ico { font-size: 2.5rem; margin-bottom: .75rem; }

    .pedido-card {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 12px; padding: 1rem; margin-bottom: .75rem; cursor: pointer;
    }
    .pedido-card:active { border-color: var(--verde); }
    .pc-topo { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .3rem; }
    .pc-num  { font-size: 1.05rem; font-weight: 700; color: var(--laranja); }
    .pc-tot  { font-size: .95rem; font-weight: 700; color: var(--verde); }
    .pc-forn { font-size: .88rem; font-weight: 600; margin-bottom: .2rem; }
    .pc-info { font-size: .74rem; color: var(--txt2); display: flex; gap: .75rem; flex-wrap: wrap; }

    /* ── FORMULÁRIO DE RECEBIMENTO ── */
    .campos-bloco {
      background: var(--card); border-bottom: 1px solid var(--borda);
      padding: .75rem 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: .5rem;
    }
    .campo-full { grid-column: 1 / -1; }
    .campo-lbl { display: block; font-size: .72rem; color: var(--txt2); margin-bottom: .3rem; font-weight: 500; }
    input[type=date], input[type=text] {
      width: 100%; background: var(--bg); border: 1px solid var(--borda);
      border-radius: 8px; color: var(--txt); font-size: .88rem;
      padding: .55rem .75rem; outline: none; -webkit-appearance: none;
    }
    input[type=date]:focus, input[type=text]:focus { border-color: var(--verde); }

    /* ── ITENS ── */
    .itens-corpo { padding: .75rem 1rem 7rem; flex: 1; }
    .item-card {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 10px; padding: .75rem; margin-bottom: .6rem;
      transition: opacity .2s;
    }
    .item-card.diverg   { border-color: var(--warn); }
    .item-card.excluido { opacity: .4; }

    /* Header do card */
    .item-header { display: flex; align-items: flex-start; gap: .5rem; margin-bottom: .6rem; }
    .item-header-left { flex: 1; min-width: 0; }
    .item-nome  { font-size: .9rem; font-weight: 700; line-height: 1.2; }
    .item-cat   { font-size: .72rem; color: var(--txt2); margin-top: .1rem; }
    .item-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: .3rem; flex-shrink: 0; }
    .item-total { font-size: .9rem; font-weight: 700; color: var(--verde); }

    /* Grid de campos */
    .item-campos { border-top: 1px solid var(--borda); padding-top: .55rem; }
    .campos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .45rem .6rem; margin-bottom: .5rem; }
    .campo-bloco { display: flex; flex-direction: column; gap: .2rem; }
    .campo-bloco.campo-full { grid-column: 1 / -1; }
    .campo-lbl  { font-size: .68rem; color: var(--txt2); text-transform: uppercase; letter-spacing: .03em; }
    .campo-val  { font-size: .85rem; color: var(--txt2); }
    .campo-input-row { display: flex; align-items: center; gap: .3rem; }
    .campo-rs   { font-size: .78rem; color: var(--txt2); flex-shrink: 0; }
    .campo-un   { font-size: .75rem; color: var(--txt2); flex-shrink: 0; }

    input[type=number], input.campo-text {
      flex: 1; background: var(--bg); border: 1.5px solid var(--borda);
      border-radius: 8px; color: var(--txt); font-size: 1rem; font-weight: 600;
      text-align: center; padding: .4rem .3rem; outline: none;
      -webkit-appearance: none; -moz-appearance: textfield; width: 100%;
    }
    input.campo-text { text-align: right; padding-right: .5rem; }
    input[type=number]:focus, input.campo-text:focus { border-color: var(--verde); }

    /* Toggle (divergência) */
    .tog-row  { display: flex; align-items: center; gap: .5rem; margin-bottom: .35rem; }
    .tog-lbl  { font-size: .74rem; flex: 1; }
    .tog-lbl.warn { color: var(--warn); }
    .toggle   { position: relative; width: 38px; height: 22px; flex-shrink: 0; display: inline-block; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .tog-track {
      position: absolute; inset: 0; background: var(--borda);
      border-radius: 22px; cursor: pointer; transition: .2s;
    }
    .tog-track::before {
      content: ''; position: absolute; width: 16px; height: 16px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s;
    }
    .toggle input:checked + .tog-track { background: var(--warn); }
    .toggle input:checked + .tog-track::before { transform: translateX(16px); }

    /* Check de recebimento — checkbox nativo estilizado (confiável no iOS) */
    input.check-rec {
      -webkit-appearance: none; appearance: none;
      width: 36px; height: 36px; flex-shrink: 0;
      border: 2px solid #6b7280; border-radius: 6px;
      background: transparent; cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    input.check-rec:checked {
      background: #22c55e; border-color: #16a34a;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: center; background-size: 22px;
    }

    .obs-input-item {
      display: none; width: 100%; background: var(--bg); border: 1px solid var(--borda);
      border-radius: 8px; color: var(--txt); font-size: .82rem;
      padding: .45rem .6rem; margin-top: .4rem; outline: none;
    }
    .obs-input-item:focus { border-color: var(--warn); }

    /* Rodapé */
    .rodape-fixo {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: .75rem 1rem; background: var(--bg); border-top: 1px solid var(--borda);
    }
    .btn-confirmar {
      width: 100%; background: var(--verde); color: #fff; border: none;
      border-radius: 12px; font-size: 1.05rem; font-weight: 700;
      padding: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-confirmar:active  { opacity: .85; }
    .btn-confirmar:disabled { background: var(--borda); color: var(--txt2); cursor: default; }

    /* Toast */
    #toast {
      position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: .65rem 1.2rem;
      border-radius: 20px; font-size: .9rem; display: none; z-index: 999;
      white-space: nowrap; max-width: 90vw;
    }
    #toast.ok  { background: var(--verde); }
    #toast.err { background: var(--danger); }

    .spin {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: s .7s linear infinite;
    }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══ TELA LOGIN ══ -->
<div id="tela-login">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="Tambaqui de Banda">
      <h2>Recebimento de Pedidos</h2>
    </div>
    <label class="login-label">E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com"
      onkeydown="if(event.key==='Enter') document.getElementById('login-senha').focus()">
    <label class="login-label">Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') fazerLogin()">
    <button class="btn-entrar" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="login-erro" id="login-erro"></div>
  </div>
</div>

<!-- ══ TELA LISTA ══ -->
<div id="tela-lista">
  <div class="cabecalho">
    <div class="cab-row">
      <img src="logo.png" alt="">
      <h1>Pendentes de Recebimento</h1>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>
  <div class="lista-body" id="lista-pedidos">
    <div class="lista-vazia"><div class="ico">⏳</div>Carregando...</div>
  </div>
</div>

<!-- ══ TELA PEDIDO ══ -->
<div id="tela-pedido">
  <div class="cabecalho">
    <div class="cab-row">
      <button class="btn-voltar" onclick="voltarLista()">← Voltar</button>
      <h1 id="ped-titulo">Pedido</h1>
    </div>
    <div style="font-size:.78rem;color:var(--txt2);margin-top:.2rem;padding-left:.2rem" id="ped-info"></div>
  </div>

  <div class="campos-bloco">
    <div>
      <label class="campo-lbl">📅 Data Recebimento *</label>
      <input type="date" id="rec-data">
    </div>
    <div>
      <label class="campo-lbl">📆 Vencimento *</label>
      <input type="date" id="rec-venc">
    </div>
    <div>
      <label class="campo-lbl">🧾 Nº NF / Documento</label>
      <input type="text" id="rec-nf" placeholder="Opcional">
    </div>
    <div>
      <label class="campo-lbl">➕ Acréscimo (R$)</label>
      <input type="text" id="rec-acrescimo" placeholder="0,00" inputmode="decimal"
        oninput="mascaraMoeda(this);atualizarTotalGeral()"
        onfocus="moedaFocus(this)"
        onblur="moedaBlur(this);atualizarTotalGeral()">
    </div>
  </div>

  <div class="itens-corpo" id="rec-itens"></div>

  <div class="rodape-fixo">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0 .6rem;border-top:1px solid var(--borda);margin-bottom:.5rem">
      <span style="font-size:.8rem;color:var(--txt2)">👤 <span id="rec-responsavel" style="color:var(--txt)">—</span></span>
      <span style="font-size:.85rem;font-weight:700">
        Total: <span id="rec-total" style="color:var(--verde);font-size:1.05rem">R$ 0,00</span>
      </span>
    </div>
    <button class="btn-confirmar" id="btn-confirmar" onclick="confirmarRecebimento()">
      ✅ Confirmar Recebimento
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

let sb   = null;
let user = null;
let _pedidoAtual = null;

function mostrar(id) {
  ['tela-login','tela-lista','tela-pedido'].forEach(t => {
    const el = document.getElementById(t);
    el.style.display = (t === id) ? 'flex' : 'none';
    if (t === id) el.style.flexDirection = 'column';
  });
}

function toast(msg, tipo) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = tipo === 'ok' ? 'ok' : 'err';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3500);
}

function brl(v) {
  return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function mascaraMoeda(el) {
  let v = el.value.replace(/[^\d,]/g, '');
  const partes = v.split(',');
  const intRaw = partes[0].replace(/\D/g, '');
  const intFmt = intRaw ? parseInt(intRaw, 10).toLocaleString('pt-BR') : '';
  const dec    = partes[1] !== undefined ? partes[1].replace(/\D/g, '').slice(0, 2) : null;
  el.value     = dec !== null ? `${intFmt},${dec}` : intFmt;
}
function mascaraMoeda4(el) {
  let v = el.value.replace(/[^\d,]/g, '');
  const partes = v.split(',');
  const intRaw = partes[0].replace(/\D/g, '');
  const intFmt = intRaw ? parseInt(intRaw, 10).toLocaleString('pt-BR') : '';
  const dec    = partes[1] !== undefined ? partes[1].replace(/\D/g, '').slice(0, 4) : null;
  el.value     = dec !== null ? `${intFmt},${dec}` : intFmt;
}
function moedaFocus(el) {
  if (el.value.endsWith(',00')) el.value = el.value.slice(0, -3);
}
function moedaBlur(el) {
  const n = parseFloat((el.value || '0').replace(/\./g,'').replace(',','.')) || 0;
  el.value = n ? n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '';
}
function moedaBlur4(el) {
  const n = parseFloat((el.value || '0').replace(/\./g,'').replace(',','.')) || 0;
  el.value = n ? n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 4 }) : '';
}
function parseMoeda(id) {
  const v = document.getElementById(id)?.value || '0';
  return parseFloat(v.replace(/\./g,'').replace(',','.')) || 0;
}
function setMoeda(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  const n = parseFloat(val) || 0;
  el.value = n ? n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '';
}

// ── INTEGRAÇÃO FINANCEIRO (mobile) ────────────────────────────────
function isCompExterna(forn) {
  return String(forn || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim() === 'comprador externo';
}

async function enviarDespesaCompExternoMobile({ pedido_num, conta_id, itensReceb, itensOriginais, totalRecebido, acrescimo, dataRec, vencimento, fornecedor_id, nf }) {
  const totalItens = Math.max(0, totalRecebido - acrescimo);

  // Agrupa por plano_conta
  const grupos = {};
  for (const ir of itensReceb) {
    const orig = itensOriginais.find(o => o.id === ir.compra_id);
    const plano = orig?.plano_conta || '';
    if (!grupos[plano]) grupos[plano] = { plano_conta: plano, subtotal: 0 };
    grupos[plano].subtotal += ir.total_recebido;
  }
  const gruposList = Object.values(grupos);
  const temRateio  = gruposList.length > 1;

  // Resolve plano_conta_id via DB
  for (const g of gruposList) {
    if (g.plano_conta) {
      const { data } = await sb.from('cmp_categorias').select('plano_conta_id').eq('nome', g.plano_conta).maybeSingle();
      g.plano_conta_id = data?.plano_conta_id || null;
    }
  }

  const { data: lanc, error } = await sb.from('lancamentos').insert([{
    descricao:      `Pedido ${pedido_num} — Comprador Externo`,
    valor:          totalItens,
    acrescimo:      acrescimo,
    vencimento,
    tipo:           'pagar',
    status:         'pago',
    data_pagamento: dataRec,
    fornecedor_id:  fornecedor_id || null,
    plano_conta_id: temRateio ? null : (gruposList[0]?.plano_conta_id || null),
    numero_pedido:  pedido_num,
    observacoes:    nf ? `Pedido ${pedido_num} — NF ${nf}` : `Pedido ${pedido_num}`,
    desconto:       0,
    tem_rateio:     temRateio,
  }]).select('id').single();

  if (error) { toast('Erro ao enviar despesa ao financeiro: ' + error, 'err'); return; }

  if (temRateio && lanc?.id) {
    await sb.from('rateio_itens').insert(
      gruposList.map(g => ({ lancamento_id: lanc.id, plano_conta_id: g.plano_conta_id, valor: g.subtotal, descricao: '' }))
    );
  }

  if (conta_id && lanc?.id) {
    await sb.from('cmp_contas_pagar').update({ lancamento_id: lanc.id }).eq('id', conta_id);
  }
}

async function _executarFinalizarCompExtMob(pedido_num, conta, ref) {
  const { data: todosReceb } = await sb.from('cmp_recebimentos')
    .select('total_recebido').eq('pedido_num', pedido_num);
  const totalAcum = (todosReceb || []).reduce((s, r) => s + (r.total_recebido || 0), 0);

  const { data: recebIds } = await sb.from('cmp_recebimentos').select('id').eq('pedido_num', pedido_num);
  const { data: itensTodos } = await sb.from('cmp_recebimento_itens')
    .select('*').in('recebimento_id', (recebIds||[]).map(r => r.id));
  const { data: itensOrig } = await sb.from('cmp_compras')
    .select('id,plano_conta').eq('pedido_num', pedido_num);

  const dataRec = new Date().toISOString().split('T')[0];
  const venc = conta.vencimento || dataRec;

  await enviarDespesaCompExternoMobile({
    pedido_num, conta_id: conta.id,
    itensReceb: itensTodos || [],
    itensOriginais: itensOrig || [],
    totalRecebido: totalAcum, acrescimo: 0,
    dataRec, vencimento: venc,
    fornecedor_id: ref?.fornecedor_id || null, nf: null,
  });
}

async function _executarFinalizarRegularMob(pedido_num, conta, ref) {
  const { data: todosReceb } = await sb.from('cmp_recebimentos')
    .select('total_recebido').eq('pedido_num', pedido_num);
  const totalAcum = (todosReceb || []).reduce((s, r) => s + (r.total_recebido || 0), 0);
  if (!totalAcum) return;

  const dataRec = new Date().toISOString().split('T')[0];
  const venc = conta.vencimento || dataRec;

  await gerarContaFinanceiroMobile({
    pedido_num, vencimento: venc, valor: totalAcum,
    fornecedor_id: ref?.fornecedor_id || null,
    fornecedor_nome: ref?.fornecedor_nome || '',
    categoria: ref?.categoria || '',
    nf_numero: null, conta_id: conta.id,
    unidade_uso: ref?.unidade_uso || '',
  });
}

async function finalizarPedidoRegularMob(pedido_num) {
  if (!confirm(`Fechar pedido ${pedido_num}?\nItens não entregues serão marcados como dispensados e o total recebido será enviado ao financeiro.`)) return;

  await sb.from('cmp_compras')
    .update({ status_receb: 'dispensado' })
    .eq('pedido_num', pedido_num)
    .not('status_receb', 'in', '("recebido","dispensado","cancelado")');

  const { data: conta } = await sb.from('cmp_contas_pagar')
    .select('id,lancamento_id,vencimento').eq('pedido_num', pedido_num).maybeSingle();

  if (conta && !conta.lancamento_id) {
    const { data: refItem } = await sb.from('cmp_compras')
      .select('fornecedor_nome,fornecedor_id,categoria,unidade_uso').eq('pedido_num', pedido_num).limit(1).maybeSingle();
    await _executarFinalizarRegularMob(pedido_num, conta, refItem);
  }

  toast(`${pedido_num} fechado e enviado ao financeiro ✅`, 'ok');
  await carregarPedidosPendentes();
}

async function finalizarPedidoCompExtMob(pedido_num) {
  if (!confirm(`Finalizar pedido ${pedido_num}?\nItens não entregues serão marcados como dispensados e o total recebido será enviado ao financeiro.`)) return;

  await sb.from('cmp_compras')
    .update({ status_receb: 'dispensado' })
    .eq('pedido_num', pedido_num)
    .not('status_receb', 'in', '("recebido","dispensado","cancelado")');

  const { data: conta } = await sb.from('cmp_contas_pagar')
    .select('id,adiantamento_lancamento_id,lancamento_id,vencimento').eq('pedido_num', pedido_num).maybeSingle();
  if (!conta) { toast('Conta a pagar não encontrada.', 'err'); return; }
  if (conta.lancamento_id) { toast('Pedido já foi enviado ao financeiro.', 'err'); return; }

  const { data: refItem } = await sb.from('cmp_compras')
    .select('fornecedor_nome,fornecedor_id').eq('pedido_num', pedido_num).limit(1).maybeSingle();

  await _executarFinalizarCompExtMob(pedido_num, conta, refItem);
  toast(`${pedido_num} finalizado e enviado ao financeiro! ✅`, 'ok');
  await carregarPedidosPendentes();
}

async function gerarContaFinanceiroMobile({ pedido_num, vencimento, valor, fornecedor_id, fornecedor_nome, categoria, nf_numero, conta_id, unidade_uso }) {
  const producao = localStorage.getItem('gc_integracao_fin') === 'producao';

  // Resolve plano_conta_id via cmp_categorias
  let plano_conta_id = null;
  if (categoria) {
    const { data: catData } = await sb.from('cmp_categorias').select('plano_conta_id').eq('nome', categoria).maybeSingle();
    plano_conta_id = catData?.plano_conta_id || null;
  }

  // Resolve unidade_id
  let unidade_id = null;
  if (unidade_uso) {
    const { data: uniData } = await sb.from('unidades').select('id').ilike('nome', unidade_uso).maybeSingle();
    unidade_id = uniData?.id || null;
  }

  const dadosBase = {
    descricao:      `Pedido ${pedido_num} — ${fornecedor_nome}`,
    valor,
    vencimento,
    tipo:           'pagar',
    status:         'pendente',
    fornecedor_id:  fornecedor_id || null,
    plano_conta_id,
    numero_pedido:  nf_numero || pedido_num,
    observacoes:    nf_numero ? `Pedido ${pedido_num} — NF ${nf_numero}` : `Pedido ${pedido_num}`,
    acrescimo:      0,
    desconto:       0,
    tem_rateio:     false,
    unidade_id,
  };

  if (!producao) {
    const { error } = await sb.from('lancamentos_rascunho').insert([{
      ...dadosBase, pedido_num, conta_id: conta_id || null,
    }]);
    if (error) toast('Aviso: rascunho financeiro não criado — ' + error.message, 'err');
  } else {
    const { data: lanc, error } = await sb.from('lancamentos').insert([{
      ...dadosBase, data_pagamento: null,
    }]).select('id').single();
    if (error) { toast('Aviso: financeiro não registrado — ' + error.message, 'err'); return; }
    if (conta_id && lanc?.id) {
      await sb.from('cmp_contas_pagar').update({ lancamento_id: lanc.id }).eq('id', conta_id);
    }
  }
}

// ── AUTH ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  mostrar('tela-login');
  try {
    sb = supabase.createClient(SB_URL, SB_KEY);
    const { data: { session } } = await sb.auth.getSession();
    if (session) { user = session.user; irParaLista(); return; }
  } catch(e) {
    console.error('Supabase init error:', e);
  }
});

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha  = document.getElementById('login-senha').value;
  const btn    = document.getElementById('btn-login');
  const erroEl = document.getElementById('login-erro');
  if (!email || !senha) { erroEl.textContent = 'Preencha e-mail e senha.'; return; }

  btn.disabled = true; btn.textContent = 'Entrando...'; erroEl.textContent = '';
  if (!sb) sb = supabase.createClient(SB_URL, SB_KEY);

  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
  if (error) {
    erroEl.textContent = 'E-mail ou senha incorretos.';
    btn.disabled = false; btn.textContent = 'Entrar';
    return;
  }
  user = data.user;
  irParaLista();
}

async function sair() {
  await sb.auth.signOut();
  location.reload();
}

// ── LISTA ────────────────────────────────────────────────────────
async function irParaLista() {
  mostrar('tela-lista');
  document.getElementById('lista-pedidos').innerHTML =
    '<div class="lista-vazia"><div class="ico">⏳</div>Carregando...</div>';
  await carregarPedidosPendentes();
}

async function carregarPedidosPendentes() {
  const { data, error } = await sb
    .from('cmp_compras')
    .select('id,pedido_num,data,data_entrega,fornecedor_nome,produto,categoria,unidade_med,quantidade,custo_unit,status_receb')
    .neq('status_receb', 'recebido')
    .order('pedido_num', { ascending: false });

  const cont = document.getElementById('lista-pedidos');
  if (error) { cont.innerHTML = `<div class="lista-vazia">Erro: ${error.message}</div>`; return; }
  if (!data?.length) {
    cont.innerHTML = '<div class="lista-vazia"><div class="ico">✅</div>Nenhum pedido pendente.<br><small style="color:#999">v2 · 0 itens encontrados</small></div>';
    return;
  }

  const grupos = {};
  data.forEach(it => {
    if (!grupos[it.pedido_num]) {
      grupos[it.pedido_num] = {
        pedido_num: it.pedido_num, data: it.data, data_entrega: it.data_entrega,
        forn: it.fornecedor_nome, itens: [], total: 0,
      };
    }
    grupos[it.pedido_num].itens.push(it);
    grupos[it.pedido_num].total += (it.quantidade || 0) * (it.custo_unit || 0);
  });

  cont.innerHTML = Object.values(grupos).map(g => {
    const dataBR   = (g.data || '').split('-').reverse().join('/');
    const entregaBR = g.data_entrega ? g.data_entrega.split('-').reverse().join('/') : null;
    const btnFinalizar = isCompExterna(g.forn)
      ? `<button onclick="event.stopPropagation();finalizarPedidoCompExtMob('${esc(g.pedido_num)}')"
           style="margin-top:8px;width:100%;padding:8px;background:#6f42c1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
           🏁 Finalizar Pedido
         </button>`
      : `<button onclick="event.stopPropagation();finalizarPedidoRegularMob('${esc(g.pedido_num)}')"
           style="margin-top:8px;width:100%;padding:8px;background:#6c757d;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
           🏁 Fechar Pedido
         </button>`;
    return `<div class="pedido-card" onclick="abrirPedido('${esc(g.pedido_num)}')">
      <div class="pc-topo">
        <span class="pc-num">#${esc(g.pedido_num)}</span>
        <span class="pc-tot">${brl(g.total)}</span>
      </div>
      <div class="pc-forn">${esc(g.forn || '—')}</div>
      <div class="pc-info">
        <span>📅 ${dataBR}</span>
        ${entregaBR ? `<span>🚚 ${entregaBR}</span>` : ''}
        <span>📦 ${g.itens.length} item(ns)</span>
      </div>
      ${btnFinalizar}
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── PEDIDO ───────────────────────────────────────────────────────
async function abrirPedido(pedido_num) {
  const { data: itens, error } = await sb
    .from('cmp_compras')
    .select('id,pedido_num,fornecedor_nome,fornecedor_id,comprador,produto,categoria,unidade_med,quantidade,custo_unit,plano_conta,unidade_uso,status_receb,acrescimo')
    .eq('pedido_num', pedido_num)
    .neq('status_receb', 'recebido')
    .order('id');

  if (error || !itens?.length) { toast('Pedido não encontrado.', 'err'); return; }

  _pedidoAtual = { pedido_num, itens };

  document.getElementById('ped-titulo').textContent = `Pedido ${pedido_num}`;
  document.getElementById('ped-info').textContent = itens[0].fornecedor_nome || '';

  const hoje = new Date().toISOString().slice(0, 10);
  document.getElementById('rec-data').value      = hoje;
  document.getElementById('rec-venc').value      = '';
  document.getElementById('rec-nf').value        = '';
  setMoeda('rec-acrescimo', parseFloat(itens[0]?.acrescimo) || 0);

  // Mostra nome do responsável (usuário logado)
  const nomeResp = (user?.user_metadata?.nome || user?.email?.split('@')[0] || '').trim();
  const elResp = document.getElementById('rec-responsavel');
  if (elResp) elResp.textContent = nomeResp || '—';

  document.getElementById('rec-itens').innerHTML = itens.map(it => {
    const qtdFmt  = (it.quantidade||0).toLocaleString('pt-BR',{maximumFractionDigits:3});
    const precoFmt = (it.custo_unit||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:4});
    const total   = (it.quantidade||0) * (it.custo_unit||0);
    const sid     = String(it.id);
    const dispBadge = it.status_receb === 'dispensado'
      ? `<span style="font-size:11px;background:#6c757d;color:#fff;padding:2px 6px;border-radius:4px;margin-left:6px;">Dispensado</span>`
      : '';
    return `<div class="item-card" id="ic-${sid}">
      <div class="item-header">
        <div class="item-header-left">
          <div class="item-nome">${esc(it.produto)}${dispBadge}</div>
          <div class="item-cat">${esc(it.categoria || '')}</div>
        </div>
        <div class="item-header-right">
          <div id="tot-${sid}" class="item-total">${brl(total)}</div>
          <input type="checkbox" class="check-rec" id="inc-${sid}"
            onchange="togIncluir('${sid}')"
            title="Receber este item">
        </div>
      </div>

      <div id="campos-${sid}" class="item-campos">
        <div class="campos-grid">
          <div class="campo-bloco">
            <span class="campo-lbl">Pedido</span>
            <span class="campo-val">${qtdFmt} ${esc(it.unidade_med||'')}</span>
          </div>
          <div class="campo-bloco">
            <span class="campo-lbl">Recebido</span>
            <div class="campo-input-row">
              <input type="number" id="qr-${sid}" value="${it.quantidade||0}" min="0" step="any" inputmode="decimal"
                oninput="atualizarTotal('${sid}',${it.quantidade||0})">
              <span class="campo-un">${esc(it.unidade_med||'')}</span>
            </div>
          </div>
          <div class="campo-bloco campo-full">
            <span class="campo-lbl">Preço unitário</span>
            <div class="campo-input-row">
              <span class="campo-rs">R$</span>
              <input type="text" inputmode="decimal" class="campo-text" id="pu-${sid}"
                value="${precoFmt}"
                oninput="mascaraMoeda4(this);atualizarTotal('${sid}',${it.quantidade||0})"
                onblur="moedaBlur4(this);atualizarTotal('${sid}',${it.quantidade||0})"
                onfocus="moedaFocus(this)">
            </div>
          </div>
          <div class="campo-bloco campo-full">
            <span class="campo-lbl" style="color:#FF6B35">Desconto (R$)</span>
            <div class="campo-input-row">
              <span class="campo-rs" style="color:#FF6B35">-</span>
              <input type="text" inputmode="decimal" class="campo-text" id="dc-${sid}"
                value="0,00"
                oninput="mascaraMoeda(this);atualizarTotal('${sid}',${it.quantidade||0})"
                onblur="moedaBlur(this);atualizarTotal('${sid}',${it.quantidade||0})"
                onfocus="moedaFocus(this)">
            </div>
          </div>
        </div>
        <div class="tog-row">
          <span class="tog-lbl warn">⚠️ Divergência de quantidade</span>
          <label class="toggle">
            <input type="checkbox" id="dt-${sid}" onchange="togObs('${sid}')">
            <span class="tog-track"></span>
          </label>
        </div>
        <input type="text" class="obs-input-item" id="ob-${sid}" placeholder="Descreva a divergência...">
      </div>
    </div>`;
  }).join('');

  mostrar('tela-pedido');
  window.scrollTo(0, 0);

  // Todos os itens começam marcados por padrão; calcula total inicial
  setTimeout(atualizarTotalGeral, 50);
}

function voltarLista() {
  _pedidoAtual = null;
  irParaLista();
}

function togIncluir(id) {
  const chk   = document.getElementById(`inc-${id}`);
  const totEl = document.getElementById(`tot-${id}`);
  if (!totEl) return;
  totEl.style.color = chk?.checked ? 'var(--verde)' : 'var(--txt2)';
  atualizarTotalGeral();
}

function atualizarTotal(id, qtdPedida) {
  const qtdRec   = parseFloat(document.getElementById(`qr-${id}`)?.value) || 0;
  const preco    = parseMoeda(`pu-${id}`);
  const desconto = parseMoeda(`dc-${id}`);
  const total    = Math.max(0, qtdRec * preco - desconto);
  const totEl    = document.getElementById(`tot-${id}`);
  if (totEl) totEl.textContent = brl(total);
  if (Math.abs(qtdRec - qtdPedida) > 0.001) {
    const tog = document.getElementById(`dt-${id}`);
    if (tog && !tog.checked) { tog.checked = true; togObs(String(id)); }
  }
  atualizarTotalGeral();
}

function togObs(id) {
  const tog  = document.getElementById(`dt-${id}`);
  const obs  = document.getElementById(`ob-${id}`);
  const card = document.getElementById(`ic-${id}`);
  if (!tog || !obs || !card) return;
  obs.style.display = tog.checked ? 'block' : 'none';
  card.classList.toggle('diverg', tog.checked);
}

function atualizarTotalGeral() {
  if (!_pedidoAtual) return;
  let soma = 0;
  _pedidoAtual.itens.forEach(it => {
    const sid   = String(it.id);
    const chk   = document.getElementById(`inc-${sid}`);
    if (!chk?.checked) return;
    const qtd      = parseFloat(document.getElementById(`qr-${sid}`)?.value) || 0;
    const preco    = parseMoeda(`pu-${sid}`);
    const desconto = parseMoeda(`dc-${sid}`);
    soma += Math.max(0, qtd * preco - desconto);
  });
  const acr = parseMoeda('rec-acrescimo');
  const el  = document.getElementById('rec-total');
  if (el) el.textContent = brl(soma + acr);
}

// ── CONFIRMAR ────────────────────────────────────────────────────
async function confirmarRecebimento() {
  const btn       = document.getElementById('btn-confirmar');
  const dataRec   = document.getElementById('rec-data').value;
  const venc      = document.getElementById('rec-venc').value;
  const nf        = document.getElementById('rec-nf').value.trim() || null;
  const acrescimo = parseMoeda('rec-acrescimo');

  if (!dataRec) { toast('Informe a data do recebimento.', 'err'); return; }
  if (!venc)    { toast('Informe a data de vencimento.', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Salvando...';

  const { pedido_num, itens } = _pedidoAtual;
  const resp = (user?.user_metadata?.nome || user?.email?.split('@')[0] || '').trim();

  // Apenas itens marcados como "Receber agora"
  const itensIncluidos = itens.filter(it => document.getElementById(`inc-${it.id}`)?.checked);
  if (!itensIncluidos.length) {
    toast('Selecione ao menos um item para receber.', 'err');
    btn.disabled = false; btn.innerHTML = '✅ Confirmar Recebimento';
    return;
  }
  const ref = itensIncluidos[0];

  const itensReceb = itensIncluidos.map(it => {
    const qtdRec   = parseFloat(document.getElementById(`qr-${it.id}`)?.value) || 0;
    const preco    = parseMoeda(`pu-${it.id}`) || it.custo_unit || 0;
    const desconto = parseMoeda(`dc-${it.id}`);
    const totalItem = Math.max(0, qtdRec * preco - desconto);
    // valor_unitario efetivo = total_com_desconto / qtd
    const vlrEfetivo = qtdRec > 0 ? totalItem / qtdRec : preco;
    const diverg = document.getElementById(`dt-${it.id}`)?.checked || false;
    const obs    = document.getElementById(`ob-${it.id}`)?.value || '';
    return {
      compra_id: it.id, produto: it.produto, categoria: it.categoria || '',
      unidade: it.unidade_med || '', qtd_pedida: it.quantidade || 0,
      qtd_recebida: qtdRec, valor_unitario: vlrEfetivo,
      total_recebido: totalItem,
      divergencia: diverg, obs_divergencia: obs,
    };
  });

  const totalItens    = itensReceb.reduce((s, i) => s + i.total_recebido, 0);
  const totalRecebido = totalItens + acrescimo;
  const temDiverg     = itensReceb.some(i => i.divergencia);

  // Guard: impede receber pedido já finalizado no financeiro
  const { data: _guardConta } = await sb.from('cmp_contas_pagar')
    .select('lancamento_id').eq('pedido_num', pedido_num).maybeSingle();
  if (_guardConta?.lancamento_id) {
    toast('Este pedido já foi enviado ao financeiro e não pode ser recebido novamente.', 'err');
    btn.disabled = false; btn.innerHTML = '✅ Confirmar Recebimento';
    return;
  }

  // 1. Cabeçalho do recebimento
  const { data: receb, error: errReceb } = await sb.from('cmp_recebimentos').insert([{
    pedido_num, data_receb: dataRec, responsavel: resp,
    fornecedor: ref?.fornecedor_nome || '', comprador: ref?.comprador || '',
    total_recebido: totalRecebido,
    status: temDiverg ? 'parcial' : 'confirmado',
  }]).select().single();

  if (errReceb) {
    toast('Erro: ' + errReceb.message, 'err');
    btn.disabled = false; btn.innerHTML = '✅ Confirmar Recebimento';
    return;
  }

  // 2. Itens do recebimento
  const { error: errItens } = await sb.from('cmp_recebimento_itens')
    .insert(itensReceb.map(it => ({ ...it, recebimento_id: receb.id })));
  if (errItens) console.error('Itens:', errItens.message);

  // 3. Atualiza cada item incluído individualmente
  for (const ir of itensReceb) {
    const restante = (ir.qtd_pedida || 0) - (ir.qtd_recebida || 0);
    if (restante <= 0.001) {
      await sb.from('cmp_compras').update({
        status_receb: 'recebido',
        custo_unit: ir.valor_unitario,
      }).eq('id', ir.compra_id);
    } else {
      await sb.from('cmp_compras').update({
        quantidade: Math.max(restante, 0),
        status_receb: 'pendente',
        custo_unit: ir.valor_unitario,
      }).eq('id', ir.compra_id);
    }
  }

  // 4. Persiste acréscimo atualizado em todos os itens do pedido
  if (acrescimo !== (parseFloat(_pedidoAtual.itens[0]?.acrescimo) || 0)) {
    await sb.from('cmp_compras').update({ acrescimo }).eq('pedido_num', pedido_num);
  }

  // 5. Cria ou atualiza conta a pagar — todos os fornecedores acumulam, financeiro só no final
  const isCompExt = isCompExterna(ref?.fornecedor_nome);
  const { data: conta } = await sb.from('cmp_contas_pagar')
    .select('id,lancamento_id,adiantamento_lancamento_id,vencimento').eq('pedido_num', pedido_num).maybeSingle();

  const { data: todosReceb } = await sb.from('cmp_recebimentos')
    .select('total_recebido').eq('pedido_num', pedido_num);
  const totalAcum = (todosReceb || []).reduce((s, r) => s + (r.total_recebido || 0), 0);

  if (conta) {
    await sb.from('cmp_contas_pagar').update({
      recebimento_id: receb.id, data_receb: dataRec, vencimento: venc, valor: totalAcum,
    }).eq('id', conta.id);
  } else {
    await sb.from('cmp_contas_pagar').insert([{
      pedido_num, recebimento_id: receb.id,
      fornecedor: ref?.fornecedor_nome || '',
      data_receb: dataRec, vencimento: venc, valor: totalAcum, status: 'pendente',
    }]);
  }

  // Auto-finaliza quando todos os itens foram recebidos
  const { data: restantes } = await sb.from('cmp_compras')
    .select('id').eq('pedido_num', pedido_num)
    .not('status_receb', 'in', '("recebido","dispensado","cancelado")');
  if (!restantes?.length) {
    const { data: contaFinal } = await sb.from('cmp_contas_pagar')
      .select('id,adiantamento_lancamento_id,lancamento_id,vencimento').eq('pedido_num', pedido_num).maybeSingle();
    if (contaFinal && !contaFinal.lancamento_id) {
      if (isCompExt) {
        await _executarFinalizarCompExtMob(pedido_num, contaFinal, ref);
      } else {
        await _executarFinalizarRegularMob(pedido_num, contaFinal, ref);
      }
      toast(`✅ Pedido ${pedido_num} finalizado e enviado ao financeiro!`, 'ok');
    }
  }

  toast(`✅ Recebimento confirmado!${temDiverg ? ' ⚠️ Com divergências.' : ''}`, 'ok');
  setTimeout(() => {
    btn.disabled = false; btn.innerHTML = '✅ Confirmar Recebimento';
    voltarLista();
  }, 1500);
}

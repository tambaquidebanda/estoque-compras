<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Recebimento — Tambaqui de Banda</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1a1f2e;
      --card:    #242938;
      --borda:   #2e3548;
      --verde:   #2EC4B6;
      --laranja: #FF6B35;
      --txt:     #e8eaf0;
      --txt2:    #8892a4;
      --danger:  #e74c3c;
      --warn:    #f39c12;
    }

    body { background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100dvh; }

    /* ── AUTH ── */
    #tela-login { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 1.5rem; }
    .login-card { background: var(--card); border: 1px solid var(--borda); border-radius: 16px; padding: 2rem 1.5rem; width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 1.5rem; }
    .login-logo img { max-width: 160px; }
    .login-logo h2 { font-size: 1.1rem; color: var(--txt2); margin-top: .5rem; }

    /* ── INPUTS ── */
    label { display: block; font-size: .8rem; color: var(--txt2); margin-bottom: .4rem; font-weight: 500; }
    input, select { width: 100%; background: var(--bg); border: 1px solid var(--borda); border-radius: 10px; color: var(--txt); font-size: 1rem; padding: .75rem 1rem; margin-bottom: 1rem; outline: none; -webkit-appearance: none; }
    input:focus, select:focus { border-color: var(--verde); }
    select option { background: var(--card); }

    /* ── BOTÕES ── */
    .btn-primary { width: 100%; background: var(--verde); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; padding: .85rem; cursor: pointer; }
    .btn-primary:active { opacity: .8; }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .erro { color: #ff6b6b; font-size: .85rem; margin-top: .5rem; text-align: center; }

    /* ── PRINCIPAL ── */
    #tela-principal { display: none; flex-direction: column; min-height: 100dvh; }

    /* Header */
    .cabecalho { background: var(--card); border-bottom: 1px solid var(--borda); padding: .75rem 1rem; position: sticky; top: 0; z-index: 50; }
    .cabecalho-topo { display: flex; align-items: center; gap: .75rem; }
    .cabecalho-topo img { height: 32px; }
    .cabecalho-topo h1 { font-size: 1rem; font-weight: 700; flex: 1; }
    .btn-sair { background: none; border: 1px solid var(--borda); color: var(--txt2); border-radius: 8px; padding: .3rem .7rem; font-size: .8rem; cursor: pointer; }
    .btn-voltar { background: none; border: none; color: var(--verde); font-size: .9rem; font-weight: 600; cursor: pointer; padding: 0; display: flex; align-items: center; gap: .3rem; }

    /* ── TELA LISTA ── */
    #tela-lista { padding: 1rem; padding-bottom: 2rem; }
    .lista-vazia { text-align: center; color: var(--txt2); padding: 3rem 1rem; }
    .lista-vazia div { font-size: 2.5rem; margin-bottom: .75rem; }

    .pedido-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: .75rem;
      cursor: pointer;
      transition: border-color .15s;
    }
    .pedido-card:active { border-color: var(--verde); }
    .pedido-card-topo { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .4rem; }
    .pedido-num { font-size: 1.1rem; font-weight: 700; color: var(--laranja); }
    .pedido-total { font-size: 1rem; font-weight: 700; color: var(--verde); }
    .pedido-forn { font-size: .9rem; color: var(--txt); font-weight: 600; margin-bottom: .2rem; }
    .pedido-info { font-size: .75rem; color: var(--txt2); display: flex; gap: .75rem; }

    /* ── TELA PEDIDO ── */
    #tela-pedido { display: none; flex-direction: column; min-height: 100dvh; }

    .pedido-header { background: var(--card); padding: .75rem 1rem; border-bottom: 1px solid var(--borda); }
    .pedido-titulo { display: flex; align-items: center; gap: .75rem; margin-bottom: .5rem; }
    .pedido-titulo h2 { font-size: 1rem; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .campos-receb { padding: .75rem 1rem; background: var(--card); border-bottom: 1px solid var(--borda); display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    .campos-receb .campo-full { grid-column: 1 / -1; }
    .campo-sm label { font-size: .72rem; }
    .campo-sm input { font-size: .88rem; padding: .55rem .75rem; margin-bottom: 0; }

    .itens-lista { padding: .75rem 1rem 7rem; }
    .item-receb {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 10px;
      padding: .75rem;
      margin-bottom: .5rem;
    }
    .item-receb.divergencia { border-color: var(--warn); }
    .item-nome-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .5rem; }
    .item-nome { font-size: .88rem; font-weight: 700; flex: 1; }
    .item-cat { font-size: .72rem; color: var(--txt2); }

    .item-qtd-row { display: flex; align-items: center; gap: .5rem; }
    .qtd-label { font-size: .75rem; color: var(--txt2); min-width: 70px; }
    .qtd-pedida { font-size: .88rem; color: var(--txt2); min-width: 60px; }
    .qtd-input { flex: 1; background: var(--bg); border: 1.5px solid var(--borda); border-radius: 8px; color: var(--txt); font-size: 1.05rem; font-weight: 600; text-align: center; padding: .45rem .3rem; -webkit-appearance: none; margin: 0; }
    .qtd-input:focus { border-color: var(--verde); outline: none; }
    .qtd-un { font-size: .78rem; color: var(--txt2); min-width: 30px; }

    /* Toggle divergência */
    .div-toggle-row { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; }
    .div-toggle-row label { font-size: .75rem; color: var(--warn); margin: 0; flex: 1; }
    .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--borda); border-radius: 22px; cursor: pointer; transition: .2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .toggle-slider { background: var(--warn); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    .obs-input { width: 100%; background: var(--bg); border: 1px solid var(--borda); border-radius: 8px; color: var(--txt); font-size: .85rem; padding: .45rem .6rem; margin-top: .4rem; display: none; outline: none; }
    .obs-input:focus { border-color: var(--warn); }

    /* Rodapé */
    .rodape-fixo { position: fixed; bottom: 0; left: 0; right: 0; padding: .75rem 1rem; background: var(--bg); border-top: 1px solid var(--borda); }
    .btn-confirmar { width: 100%; background: var(--verde); color: #fff; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; padding: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .btn-confirmar:active { opacity: .85; }
    .btn-confirmar:disabled { background: #2e3548; color: var(--txt2); cursor: default; }

    /* Toast */
    #toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: .65rem 1.2rem; border-radius: 20px; font-size: .9rem; display: none; z-index: 999; white-space: nowrap; max-width: 90vw; }
    #toast.ok  { background: var(--verde); }
    #toast.err { background: var(--danger); }

    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="Tambaqui de Banda">
      <h2>Recebimento de Pedidos</h2>
    </div>
    <label>E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com"
      onkeydown="if(event.key==='Enter') document.getElementById('login-senha').focus()">
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') fazerLogin()">
    <button class="btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="erro" id="login-erro"></div>
  </div>
</div>

<!-- PRINCIPAL -->
<div id="tela-principal">

  <!-- TELA LISTA -->
  <div id="tela-lista" style="display:none;flex-direction:column;min-height:100dvh">
    <div class="cabecalho">
      <div class="cabecalho-topo">
        <img src="logo.png" alt="">
        <h1>Recebimentos Pendentes</h1>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
    </div>
    <div id="lista-pedidos" style="padding:1rem;padding-bottom:2rem">
      <div class="lista-vazia"><div>⏳</div>Carregando pedidos...</div>
    </div>
  </div>

  <!-- TELA PEDIDO -->
  <div id="tela-pedido" style="display:none;flex-direction:column;min-height:100dvh">
    <div class="cabecalho">
      <div class="pedido-titulo">
        <button class="btn-voltar" onclick="voltarLista()">← Voltar</button>
        <h2 id="ped-titulo">Pedido</h2>
        <span id="ped-forn" style="font-size:.78rem;color:var(--txt2)"></span>
      </div>
    </div>

    <!-- Campos de cabeçalho do recebimento -->
    <div class="campos-receb">
      <div class="campo-sm">
        <label>📅 Data Recebimento *</label>
        <input type="date" id="rec-data" style="margin:0">
      </div>
      <div class="campo-sm">
        <label>📆 Vencimento *</label>
        <input type="date" id="rec-venc" style="margin:0">
      </div>
      <div class="campo-sm campo-full">
        <label>🧾 Nº NF / Documento</label>
        <input type="text" id="rec-nf" placeholder="Opcional" style="margin:0">
      </div>
    </div>

    <!-- Itens -->
    <div class="itens-lista" id="rec-itens"></div>

    <div class="rodape-fixo">
      <button class="btn-confirmar" id="btn-confirmar" onclick="confirmarRecebimento()">
        ✅ Confirmar Recebimento
      </button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
'use strict';

let sb   = null;
let user = null;
let _pedidoAtual = null; // { pedido_num, itens[] }

function toast(msg, tipo) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = tipo === 'ok' ? 'ok' : 'err';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3500);
}

function brl(v) {
  return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

// ── AUTH ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  sb = supabase.createClient(SB_URL, SB_KEY);
  const { data: { session } } = await sb.auth.getSession();
  if (session) { user = session.user; entrar(); }
});

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha  = document.getElementById('login-senha').value;
  const btn    = document.getElementById('btn-login');
  const erro   = document.getElementById('login-erro');
  if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha.'; return; }

  btn.disabled = true; btn.textContent = 'Entrando...'; erro.textContent = '';
  if (!sb) sb = supabase.createClient(SB_URL, SB_KEY);

  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
  if (error) { erro.textContent = 'E-mail ou senha incorretos.'; btn.disabled = false; btn.textContent = 'Entrar'; return; }
  user = data.user;
  entrar();
}

function entrar() {
  document.getElementById('tela-login').style.display = 'none';
  const tp = document.getElementById('tela-principal');
  tp.style.display = 'flex';
  tp.style.flexDirection = 'column';
  mostrarLista();
}

async function sair() {
  await sb.auth.signOut();
  location.reload();
}

// ── LISTA DE PEDIDOS ──────────────────────────────────────────────
function mostrarLista() {
  document.getElementById('tela-lista').style.display = 'flex';
  document.getElementById('tela-pedido').style.display = 'none';
  carregarPedidosPendentes();
}

async function carregarPedidosPendentes() {
  const cont = document.getElementById('lista-pedidos');
  cont.innerHTML = '<div class="lista-vazia"><div>⏳</div>Carregando...</div>';

  const { data, error } = await sb
    .from('cmp_compras')
    .select('id,pedido_num,data,data_entrega,fornecedor_nome,comprador,produto,categoria,unidade_med,quantidade,custo_unit,status_receb')
    .neq('status_receb', 'recebido')
    .order('pedido_num', { ascending: false });

  if (error || !data?.length) {
    cont.innerHTML = '<div class="lista-vazia"><div>✅</div>Nenhum pedido pendente de recebimento.</div>';
    return;
  }

  // Agrupa por pedido_num
  const grupos = {};
  data.forEach(it => {
    if (!grupos[it.pedido_num]) {
      grupos[it.pedido_num] = { pedido_num: it.pedido_num, data: it.data, data_entrega: it.data_entrega,
        forn: it.fornecedor_nome, comp: it.comprador, itens: [], total: 0 };
    }
    grupos[it.pedido_num].itens.push(it);
    grupos[it.pedido_num].total += (it.quantidade || 0) * (it.custo_unit || 0);
  });

  cont.innerHTML = Object.values(grupos).map(g => {
    const dataBR  = (g.data || '').split('-').reverse().join('/');
    const entrega = g.data_entrega ? `Entrega: ${g.data_entrega.split('-').reverse().join('/')}` : '';
    return `
      <div class="pedido-card" onclick="abrirPedido('${g.pedido_num}')">
        <div class="pedido-card-topo">
          <span class="pedido-num">#${g.pedido_num}</span>
          <span class="pedido-total">${brl(g.total)}</span>
        </div>
        <div class="pedido-forn">${g.forn || '—'}</div>
        <div class="pedido-info">
          <span>📅 ${dataBR}</span>
          ${entrega ? `<span>🚚 ${entrega}</span>` : ''}
          <span>📦 ${g.itens.length} item(ns)</span>
        </div>
      </div>`;
  }).join('');
}

// ── TELA DO PEDIDO ────────────────────────────────────────────────
async function abrirPedido(pedido_num) {
  const { data: itens } = await sb
    .from('cmp_compras')
    .select('id,pedido_num,data,fornecedor_id,fornecedor_nome,comprador,produto,categoria,unidade_med,quantidade,custo_unit,plano_conta,unidade_uso,status_receb')
    .eq('pedido_num', pedido_num)
    .neq('status_receb', 'recebido')
    .order('id');

  if (!itens?.length) { toast('Pedido não encontrado.', 'err'); return; }

  _pedidoAtual = { pedido_num, itens };

  document.getElementById('ped-titulo').textContent = `Pedido #${pedido_num}`;
  document.getElementById('ped-forn').textContent   = itens[0].fornecedor_nome || '';

  // Datas padrão
  const hoje = new Date().toISOString().slice(0, 10);
  document.getElementById('rec-data').value = hoje;
  document.getElementById('rec-venc').value = '';
  document.getElementById('rec-nf').value   = '';

  // Renderiza itens
  document.getElementById('rec-itens').innerHTML = itens.map(it => `
    <div class="item-receb" id="item-card-${it.id}">
      <div class="item-nome-row">
        <div>
          <div class="item-nome">${it.produto}</div>
          <div class="item-cat">${it.categoria || ''}</div>
        </div>
      </div>
      <div class="item-qtd-row">
        <span class="qtd-label">Pedido:</span>
        <span class="qtd-pedida">${(it.quantidade||0).toLocaleString('pt-BR',{maximumFractionDigits:3})} ${it.unidade_med||''}</span>
        <span class="qtd-label" style="text-align:right">Recebido:</span>
        <input type="number" class="qtd-input" id="qrec-${it.id}"
          value="${it.quantidade}" min="0" step="any" inputmode="decimal"
          oninput="verificarDivergencia(${it.id}, ${it.quantidade})">
        <span class="qtd-un">${it.unidade_med||''}</span>
      </div>
      <div class="div-toggle-row">
        <label for="div-tog-${it.id}">⚠️ Divergência</label>
        <label class="toggle">
          <input type="checkbox" id="div-tog-${it.id}"
            onchange="toggleObs(${it.id})">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <input type="text" class="obs-input" id="obs-${it.id}" placeholder="Descreva a divergência...">
    </div>`).join('');

  document.getElementById('tela-lista').style.display  = 'none';
  document.getElementById('tela-pedido').style.display = 'flex';
  window.scrollTo(0, 0);
}

function voltarLista() {
  document.getElementById('tela-pedido').style.display = 'none';
  document.getElementById('tela-lista').style.display  = 'flex';
  _pedidoAtual = null;
}

function verificarDivergencia(id, qtdPedida) {
  const qtdRec = parseFloat(document.getElementById(`qrec-${id}`)?.value) || 0;
  const tog    = document.getElementById(`div-tog-${id}`);
  const card   = document.getElementById(`item-card-${id}`);
  if (Math.abs(qtdRec - qtdPedida) > 0.001) {
    tog.checked = true;
    card.classList.add('divergencia');
    document.getElementById(`obs-${id}`).style.display = 'block';
  }
}

function toggleObs(id) {
  const tog  = document.getElementById(`div-tog-${id}`);
  const obs  = document.getElementById(`obs-${id}`);
  const card = document.getElementById(`item-card-${id}`);
  obs.style.display = tog.checked ? 'block' : 'none';
  card.classList.toggle('divergencia', tog.checked);
}

// ── CONFIRMAR RECEBIMENTO ─────────────────────────────────────────
async function confirmarRecebimento() {
  const btn = document.getElementById('btn-confirmar');
  const dataRec = document.getElementById('rec-data').value;
  const venc    = document.getElementById('rec-venc').value;
  const nf      = document.getElementById('rec-nf').value.trim() || null;

  if (!dataRec) { toast('Informe a data do recebimento.', 'err'); return; }
  if (!venc)    { toast('Informe a data de vencimento.', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Salvando...';

  const { pedido_num, itens } = _pedidoAtual;
  const resp = (user?.user_metadata?.nome || user?.email?.split('@')[0] || '').trim();
  const ref  = itens[0];

  const itensReceb = itens.map(it => {
    const qtdRec = parseFloat(document.getElementById(`qrec-${it.id}`)?.value) || 0;
    const diverg = document.getElementById(`div-tog-${it.id}`)?.checked || false;
    const obs    = document.getElementById(`obs-${it.id}`)?.value || '';
    return {
      compra_id: it.id, produto: it.produto, categoria: it.categoria || '',
      unidade: it.unidade_med || '', qtd_pedida: it.quantidade || 0,
      qtd_recebida: qtdRec, valor_unitario: it.custo_unit || 0,
      total_recebido: qtdRec * (it.custo_unit || 0),
      divergencia: diverg, obs_divergencia: obs,
    };
  });

  const totalRecebido = itensReceb.reduce((s, i) => s + i.total_recebido, 0);
  const temDiverg     = itensReceb.some(i => i.divergencia);

  // 1. Salva cabeçalho do recebimento
  const { data: receb, error: errReceb } = await sb.from('cmp_recebimentos').insert([{
    pedido_num, data_receb: dataRec, responsavel: resp,
    fornecedor: ref?.fornecedor_nome || '', comprador: ref?.comprador || '',
    total_recebido: totalRecebido,
    status: temDiverg ? 'parcial' : 'confirmado',
  }]).select().single();

  if (errReceb) {
    toast('Erro ao salvar: ' + errReceb.message, 'err');
    btn.disabled = false; btn.innerHTML = '✅ Confirmar Recebimento';
    return;
  }

  // 2. Salva itens do recebimento
  await sb.from('cmp_recebimento_itens').insert(itensReceb.map(it => ({ ...it, recebimento_id: receb.id })));

  // 3. Marca pedido como recebido
  await sb.from('cmp_compras').update({ status_receb: 'recebido' }).eq('pedido_num', pedido_num);

  // 4. Atualiza cmp_contas_pagar se existir
  const { data: conta } = await sb.from('cmp_contas_pagar')
    .select('id').eq('pedido_num', pedido_num).maybeSingle();
  if (conta) {
    await sb.from('cmp_contas_pagar').update({
      recebimento_id: receb.id, data_receb: dataRec,
      vencimento: venc, valor: totalRecebido,
      nf_numero: nf,
    }).eq('id', conta.id);
  }

  const msg = `✅ Recebimento confirmado!${temDiverg ? ' ⚠️ Com divergências.' : ''}`;
  toast(msg, 'ok');

  setTimeout(() => {
    btn.disabled = false; btn.innerHTML = '✅ Confirmar Recebimento';
    voltarLista();
  }, 1500);
}
</script>
</body>
</html>

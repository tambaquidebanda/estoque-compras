<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Recebimento — Tambaqui de Banda</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1a1f2e;
      --card:    #242938;
      --borda:   #2e3548;
      --verde:   #2EC4B6;
      --laranja: #FF6B35;
      --txt:     #e8eaf0;
      --txt2:    #8892a4;
      --danger:  #e74c3c;
      --warn:    #f39c12;
    }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
    }

    /* ── TELAS ── */
    #tela-login,
    #tela-lista,
    #tela-pedido { display: none; flex-direction: column; min-height: 100dvh; }
    #tela-login { align-items: center; justify-content: center; padding: 1.5rem; }

    /* ── LOGIN ── */
    .login-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 380px;
    }
    .login-logo { text-align: center; margin-bottom: 1.5rem; }
    .login-logo img { max-width: 160px; }
    .login-logo h2 { font-size: 1.1rem; color: var(--txt2); margin-top: .5rem; }
    .login-label { display: block; font-size: .8rem; color: var(--txt2); margin-bottom: .4rem; font-weight: 500; }
    input[type=email], input[type=password] {
      width: 100%; background: var(--bg); border: 1px solid var(--borda);
      border-radius: 10px; color: var(--txt); font-size: 1rem;
      padding: .75rem 1rem; margin-bottom: 1rem; outline: none; -webkit-appearance: none;
    }
    input[type=email]:focus, input[type=password]:focus { border-color: var(--verde); }
    .btn-entrar {
      width: 100%; background: var(--verde); color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600; padding: .85rem; cursor: pointer;
    }
    .btn-entrar:disabled { opacity: .5; }
    .login-erro { color: #ff6b6b; font-size: .85rem; margin-top: .5rem; text-align: center; }

    /* ── CABEÇALHO ── */
    .cabecalho {
      background: var(--card);
      border-bottom: 1px solid var(--borda);
      padding: .75rem 1rem;
      position: sticky; top: 0; z-index: 50;
    }
    .cab-row { display: flex; align-items: center; gap: .75rem; }
    .cab-row img { height: 32px; }
    .cab-row h1 { font-size: 1rem; font-weight: 700; flex: 1; }
    .btn-sair { background: none; border: 1px solid var(--borda); color: var(--txt2); border-radius: 8px; padding: .3rem .7rem; font-size: .8rem; cursor: pointer; }
    .btn-voltar { background: none; border: none; color: var(--verde); font-size: .9rem; font-weight: 600; cursor: pointer; padding: 0; }

    /* ── LISTA ── */
    .lista-body { padding: 1rem; padding-bottom: 5rem; flex: 1; }
    .lista-vazia { text-align: center; color: var(--txt2); padding: 3rem 1rem; }
    .lista-vazia .ico { font-size: 2.5rem; margin-bottom: .75rem; }

    .pedido-card {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 12px; padding: 1rem; margin-bottom: .75rem; cursor: pointer;
    }
    .pedido-card:active { border-color: var(--verde); }
    .pc-topo { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .3rem; }
    .pc-num  { font-size: 1.05rem; font-weight: 700; color: var(--laranja); }
    .pc-tot  { font-size: .95rem; font-weight: 700; color: var(--verde); }
    .pc-forn { font-size: .88rem; font-weight: 600; margin-bottom: .2rem; }
    .pc-info { font-size: .74rem; color: var(--txt2); display: flex; gap: .75rem; flex-wrap: wrap; }

    /* ── FORMULÁRIO DE RECEBIMENTO ── */
    .campos-bloco {
      background: var(--card); border-bottom: 1px solid var(--borda);
      padding: .75rem 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: .5rem;
    }
    .campo-full { grid-column: 1 / -1; }
    .campo-lbl { display: block; font-size: .72rem; color: var(--txt2); margin-bottom: .3rem; font-weight: 500; }
    input[type=date], input[type=text] {
      width: 100%; background: var(--bg); border: 1px solid var(--borda);
      border-radius: 8px; color: var(--txt); font-size: .88rem;
      padding: .55rem .75rem; outline: none; -webkit-appearance: none;
    }
    input[type=date]:focus, input[type=text]:focus { border-color: var(--verde); }

    /* ── ITENS ── */
    .itens-corpo { padding: .75rem 1rem 7rem; flex: 1; }
    .item-card {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 10px; padding: .75rem; margin-bottom: .5rem;
      transition: opacity .2s;
    }
    .item-card.diverg  { border-color: var(--warn); }
    .item-card.excluido { opacity: .4; }
    .item-nome  { font-size: .88rem; font-weight: 700; }
    .item-cat   { font-size: .72rem; color: var(--txt2); margin-bottom: .45rem; }

    .qtd-row    { display: flex; align-items: center; gap: .4rem; margin-bottom: .4rem; }
    .qtd-label  { font-size: .72rem; color: var(--txt2); white-space: nowrap; }
    .qtd-pedida { font-size: .82rem; color: var(--txt2); min-width: 55px; }
    input[type=number] {
      flex: 1; background: var(--bg); border: 1.5px solid var(--borda);
      border-radius: 8px; color: var(--txt); font-size: 1rem; font-weight: 600;
      text-align: center; padding: .45rem .3rem; outline: none; -webkit-appearance: none;
      -moz-appearance: textfield;
    }
    input[type=number]:focus { border-color: var(--verde); }
    .qtd-un { font-size: .75rem; color: var(--txt2); min-width: 28px; }

    /* Toggle */
    .tog-row  { display: flex; align-items: center; gap: .5rem; margin-bottom: .35rem; }
    .tog-lbl  { font-size: .74rem; flex: 1; }
    .tog-lbl.warn { color: var(--warn); }
    .tog-lbl.rec  { color: var(--verde); font-weight: 600; }
    .toggle   { position: relative; width: 38px; height: 22px; flex-shrink: 0; display: inline-block; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .tog-track {
      position: absolute; inset: 0; background: var(--borda);
      border-radius: 22px; cursor: pointer; transition: .2s;
    }
    .tog-track::before {
      content: ''; position: absolute; width: 16px; height: 16px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s;
    }
    .toggle input:checked + .tog-track { background: var(--warn); }
    .toggle input:checked + .tog-track::before { transform: translateX(16px); }
    .toggle.verde input:checked + .tog-track { background: var(--verde); }
    .toggle.verde input:not(:checked) + .tog-track { background: var(--borda); }

    .obs-input-item {
      display: none; width: 100%; background: var(--bg); border: 1px solid var(--borda);
      border-radius: 8px; color: var(--txt); font-size: .82rem;
      padding: .45rem .6rem; margin-top: .4rem; outline: none;
    }
    .obs-input-item:focus { border-color: var(--warn); }

    /* Rodapé */
    .rodape-fixo {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: .75rem 1rem; background: var(--bg); border-top: 1px solid var(--borda);
    }
    .btn-confirmar {
      width: 100%; background: var(--verde); color: #fff; border: none;
      border-radius: 12px; font-size: 1.05rem; font-weight: 700;
      padding: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-confirmar:active  { opacity: .85; }
    .btn-confirmar:disabled { background: var(--borda); color: var(--txt2); cursor: default; }

    /* Toast */
    #toast {
      position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: .65rem 1.2rem;
      border-radius: 20px; font-size: .9rem; display: none; z-index: 999;
      white-space: nowrap; max-width: 90vw;
    }
    #toast.ok  { background: var(--verde); }
    #toast.err { background: var(--danger); }

    .spin {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: s .7s linear infinite;
    }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══ TELA LOGIN ══ -->
<div id="tela-login">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="Tambaqui de Banda">
      <h2>Recebimento de Pedidos</h2>
    </div>
    <label class="login-label">E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com"
      onkeydown="if(event.key==='Enter') document.getElementById('login-senha').focus()">
    <label class="login-label">Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') fazerLogin()">
    <button class="btn-entrar" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="login-erro" id="login-erro"></div>
  </div>
</div>

<!-- ══ TELA LISTA ══ -->
<div id="tela-lista">
  <div class="cabecalho">
    <div class="cab-row">
      <img src="logo.png" alt="">
      <h1>Pendentes de Recebimento</h1>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>
  <div class="lista-body" id="lista-pedidos">
    <div class="lista-vazia"><div class="ico">⏳</div>Carregando...</div>
  </div>
</div>

<!-- ══ TELA PEDIDO ══ -->
<div id="tela-pedido">
  <div class="cabecalho">
    <div class="cab-row">
      <button class="btn-voltar" onclick="voltarLista()">← Voltar</button>
      <h1 id="ped-titulo">Pedido</h1>
    </div>
    <div style="font-size:.78rem;color:var(--txt2);margin-top:.2rem;padding-left:.2rem" id="ped-info"></div>
  </div>

  <div class="campos-bloco">
    <div>
      <label class="campo-lbl">📅 Data Recebimento *</label>
      <input type="date" id="rec-data">
    </div>
    <div>
      <label class="campo-lbl">📆 Vencimento *</label>
      <input type="date" id="rec-venc">
    </div>
    <div class="campo-full">
      <label class="campo-lbl">🧾 Nº NF / Documento</label>
      <input type="text" id="rec-nf" placeholder="Opcional">
    </div>
  </div>

  <div class="itens-corpo" id="rec-itens"></div>

  <div class="rodape-fixo">
    <button class="btn-confirmar" id="btn-confirmar" onclick="confirmarRecebimento()">
      ✅ Confirmar Recebimento
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

let sb   = null;
let user = null;
let _pedidoAtual = null;

function mostrar(id) {
  ['tela-login','tela-lista','tela-pedido'].forEach(t => {
    const el = document.getElementById(t);
    el.style.display = (t === id) ? 'flex' : 'none';
    if (t === id) el.style.flexDirection = 'column';
  });
}

function toast(msg, tipo) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = tipo === 'ok' ? 'ok' : 'err';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3500);
}

function brl(v) {
  return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

// ── AUTH ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  mostrar('tela-login');
  try {
    sb = supabase.createClient(SB_URL, SB_KEY);
    const { data: { session } } = await sb.auth.getSession();
    if (session) { user = session.user; irParaLista(); return; }
  } catch(e) {
    console.error('Supabase init error:', e);
  }
});

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha  = document.getElementById('login-senha').value;
  const btn    = document.getElementById('btn-login');
  const erroEl = document.getElementById('login-erro');
  if (!email || !senha) { erroEl.textContent = 'Preencha e-mail e senha.'; return; }

  btn.disabled = true; btn.textContent = 'Entrando...'; erroEl.textContent = '';
  if (!sb) sb = supabase.createClient(SB_URL, SB_KEY);

  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
  if (error) {
    erroEl.textContent = 'E-mail ou senha incorretos.';
    btn.disabled = false; btn.textContent = 'Entrar';
    return;
  }
  user = data.user;
  irParaLista();
}

async function sair() {
  await sb.auth.signOut();
  location.reload();
}

// ── LISTA ────────────────────────────────────────────────────────
async function irParaLista() {
  mostrar('tela-lista');
  document.getElementById('lista-pedidos').innerHTML =
    '<div class="lista-vazia"><div class="ico">⏳</div>Carregando...</div>';
  await carregarPedidosPendentes();
}

async function carregarPedidosPendentes() {
  const { data, error } = await sb
    .from('cmp_compras')
    .select('id,pedido_num,data,data_entrega,fornecedor_nome,produto,categoria,unidade_med,quantidade,custo_unit,status_receb')
    .or('status_receb.neq.recebido,status_receb.is.null')
    .order('pedido_num', { ascending: false });

  const cont = document.getElementById('lista-pedidos');
  if (error) { cont.innerHTML = `<div class="lista-vazia">Erro: ${error.message}</div>`; return; }
  if (!data?.length) {
    cont.innerHTML = '<div class="lista-vazia"><div class="ico">✅</div>Nenhum pedido pendente.</div>';
    return;
  }

  const grupos = {};
  data.forEach(it => {
    if (!grupos[it.pedido_num]) {
      grupos[it.pedido_num] = {
        pedido_num: it.pedido_num, data: it.data, data_entrega: it.data_entrega,
        forn: it.fornecedor_nome, itens: [], total: 0,
      };
    }
    grupos[it.pedido_num].itens.push(it);
    grupos[it.pedido_num].total += (it.quantidade || 0) * (it.custo_unit || 0);
  });

  cont.innerHTML = Object.values(grupos).map(g => {
    const dataBR   = (g.data || '').split('-').reverse().join('/');
    const entregaBR = g.data_entrega ? g.data_entrega.split('-').reverse().join('/') : null;
    return `<div class="pedido-card" onclick="abrirPedido('${esc(g.pedido_num)}')">
      <div class="pc-topo">
        <span class="pc-num">#${esc(g.pedido_num)}</span>
        <span class="pc-tot">${brl(g.total)}</span>
      </div>
      <div class="pc-forn">${esc(g.forn || '—')}</div>
      <div class="pc-info">
        <span>📅 ${dataBR}</span>
        ${entregaBR ? `<span>🚚 ${entregaBR}</span>` : ''}
        <span>📦 ${g.itens.length} item(ns)</span>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── PEDIDO ───────────────────────────────────────────────────────
async function abrirPedido(pedido_num) {
  const { data: itens, error } = await sb
    .from('cmp_compras')
    .select('id,pedido_num,fornecedor_nome,fornecedor_id,comprador,produto,categoria,unidade_med,quantidade,custo_unit,plano_conta,unidade_uso,status_receb')
    .eq('pedido_num', pedido_num)
    .or('status_receb.neq.recebido,status_receb.is.null')
    .order('id');

  if (error || !itens?.length) { toast('Pedido não encontrado.', 'err'); return; }

  _pedidoAtual = { pedido_num, itens };

  document.getElementById('ped-titulo').textContent = `Pedido #${pedido_num}`;
  document.getElementById('ped-info').textContent = itens[0].fornecedor_nome || '';

  const hoje = new Date().toISOString().slice(0, 10);
  document.getElementById('rec-data').value = hoje;
  document.getElementById('rec-venc').value = '';
  document.getElementById('rec-nf').value   = '';

  document.getElementById('rec-itens').innerHTML = itens.map(it => {
    const qtdFmt = (it.quantidade||0).toLocaleString('pt-BR',{maximumFractionDigits:3});
    const total  = (it.quantidade||0) * (it.custo_unit||0);
    return `<div class="item-card" id="ic-${it.id}">
      <!-- Nome + total dinâmico -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.1rem">
        <div>
          <div class="item-nome">${esc(it.produto)}</div>
          <div class="item-cat">${esc(it.categoria || '')}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:.5rem">
          <div id="tot-${it.id}" style="font-size:.88rem;color:var(--verde);font-weight:700">${brl(total)}</div>
        </div>
      </div>

      <!-- Toggle: Receber agora -->
      <div class="tog-row">
        <span class="tog-lbl rec">✅ Receber agora</span>
        <label class="toggle verde">
          <input type="checkbox" id="inc-${it.id}" checked onchange="togIncluir(${it.id})">
          <span class="tog-track"></span>
        </label>
      </div>

      <!-- Qtd + preço (ocultos quando excluído) -->
      <div id="campos-${it.id}">
        <div class="qtd-row">
          <span class="qtd-label">Pedido:</span>
          <span class="qtd-pedida">${qtdFmt} ${esc(it.unidade_med||'')}</span>
          <span class="qtd-label">Recebido:</span>
          <input type="number" id="qr-${it.id}" value="${it.quantidade}" min="0" step="any" inputmode="decimal"
            oninput="atualizarTotal(${it.id},${it.quantidade})">
          <span class="qtd-un">${esc(it.unidade_med||'')}</span>
        </div>
        <div class="qtd-row">
          <span class="qtd-label">Preço/un:</span>
          <input type="number" id="pu-${it.id}" value="${it.custo_unit||0}" min="0" step="0.01" inputmode="decimal"
            oninput="atualizarTotal(${it.id},${it.quantidade})">
          <span class="qtd-un">R$</span>
        </div>
        <div class="tog-row" style="margin-top:.1rem">
          <span class="tog-lbl warn">⚠️ Divergência de quantidade</span>
          <label class="toggle">
            <input type="checkbox" id="dt-${it.id}" onchange="togObs(${it.id})">
            <span class="tog-track"></span>
          </label>
        </div>
        <input type="text" class="obs-input-item" id="ob-${it.id}" placeholder="Descreva a divergência...">
      </div>
    </div>`;
  }).join('');

  mostrar('tela-pedido');
  window.scrollTo(0, 0);
}

function voltarLista() {
  _pedidoAtual = null;
  irParaLista();
}

function togIncluir(id) {
  const inc    = document.getElementById(`inc-${id}`);
  const card   = document.getElementById(`ic-${id}`);
  const campos = document.getElementById(`campos-${id}`);
  const totEl  = document.getElementById(`tot-${id}`);
  if (!inc || !card) return;
  const ativo = inc.checked;
  card.classList.toggle('excluido', !ativo);
  if (campos) campos.style.display = ativo ? '' : 'none';
  if (totEl)  totEl.style.color    = ativo ? 'var(--verde)' : 'var(--txt2)';
}

function atualizarTotal(id, qtdPedida) {
  const qtdRec = parseFloat(document.getElementById(`qr-${id}`)?.value) || 0;
  const preco  = parseFloat(document.getElementById(`pu-${id}`)?.value) || 0;
  const totEl  = document.getElementById(`tot-${id}`);
  if (totEl) totEl.textContent = brl(qtdRec * preco);
  // acende divergência automaticamente se qtd diferente
  if (Math.abs(qtdRec - qtdPedida) > 0.001) {
    const tog = document.getElementById(`dt-${id}`);
    if (tog && !tog.checked) { tog.checked = true; togObs(id); }
  }
}

function togObs(id) {
  const tog  = document.getElementById(`dt-${id}`);
  const obs  = document.getElementById(`ob-${id}`);
  const card = document.getElementById(`ic-${id}`);
  if (!tog || !obs || !card) return;
  obs.style.display = tog.checked ? 'block' : 'none';
  card.classList.toggle('diverg', tog.checked);
}

// ── CONFIRMAR ────────────────────────────────────────────────────
async function confirmarRecebimento() {
  const btn     = document.getElementById('btn-confirmar');
  const dataRec = document.getElementById('rec-data').value;
  const venc    = document.getElementById('rec-venc').value;
  const nf      = document.getElementById('rec-nf').value.trim() || null;

  if (!dataRec) { toast('Informe a data do recebimento.', 'err'); return; }
  if (!venc)    { toast('Informe a data de vencimento.', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Salvando...';

  const { pedido_num, itens } = _pedidoAtual;
  const resp = (user?.user_metadata?.nome || user?.email?.split('@')[0] || '').trim();

  // Apenas itens marcados como "Receber agora"
  const itensIncluidos = itens.filter(it => document.getElementById(`inc-${it.id}`)?.checked);
  if (!itensIncluidos.length) {
    toast('Selecione ao menos um item para receber.', 'err');
    btn.disabled = false; btn.innerHTML = '✅ Confirmar Recebimento';
    return;
  }
  const ref = itensIncluidos[0];

  const itensReceb = itensIncluidos.map(it => {
    const qtdRec = parseFloat(document.getElementById(`qr-${it.id}`)?.value) || 0;
    const preco  = parseFloat(document.getElementById(`pu-${it.id}`)?.value) || it.custo_unit || 0;
    const diverg = document.getElementById(`dt-${it.id}`)?.checked || false;
    const obs    = document.getElementById(`ob-${it.id}`)?.value || '';
    return {
      compra_id: it.id, produto: it.produto, categoria: it.categoria || '',
      unidade: it.unidade_med || '', qtd_pedida: it.quantidade || 0,
      qtd_recebida: qtdRec, valor_unitario: preco,
      total_recebido: qtdRec * preco,
      divergencia: diverg, obs_divergencia: obs,
    };
  });

  const totalRecebido = itensReceb.reduce((s, i) => s + i.total_recebido, 0);
  const temDiverg     = itensReceb.some(i => i.divergencia);

  // 1. Cabeçalho do recebimento
  const { data: receb, error: errReceb } = await sb.from('cmp_recebimentos').insert([{
    pedido_num, data_receb: dataRec, responsavel: resp,
    fornecedor: ref?.fornecedor_nome || '', comprador: ref?.comprador || '',
    total_recebido: totalRecebido,
    status: temDiverg ? 'parcial' : 'confirmado',
  }]).select().single();

  if (errReceb) {
    toast('Erro: ' + errReceb.message, 'err');
    btn.disabled = false; btn.innerHTML = '✅ Confirmar Recebimento';
    return;
  }

  // 2. Itens do recebimento
  const { error: errItens } = await sb.from('cmp_recebimento_itens')
    .insert(itensReceb.map(it => ({ ...it, recebimento_id: receb.id })));
  if (errItens) console.error('Itens:', errItens.message);

  // 3. Marca só os itens recebidos agora (recebimento parcial é possível)
  const idsRecebidos = itensIncluidos.map(it => it.id);
  await sb.from('cmp_compras').update({ status_receb: 'recebido' }).in('id', idsRecebidos);

  // 4. Atualiza conta a pagar se existir
  const { data: conta } = await sb.from('cmp_contas_pagar')
    .select('id').eq('pedido_num', pedido_num).maybeSingle();
  if (conta) {
    await sb.from('cmp_contas_pagar').update({
      recebimento_id: receb.id, data_receb: dataRec,
      vencimento: venc, valor: totalRecebido, nf_numero: nf,
    }).eq('id', conta.id);
  }

  toast(`✅ Recebimento confirmado!${temDiverg ? ' ⚠️ Com divergências.' : ''}`, 'ok');
  setTimeout(() => {
    btn.disabled = false; btn.innerHTML = '✅ Confirmar Recebimento';
    voltarLista();
  }, 1500);
}
</script>
</body>
</html>

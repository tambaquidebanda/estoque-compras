<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contagem/Pedido — Tambaqui de Banda</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #1a1f2e;
      --card:    #242938;
      --borda:   #2e3548;
      --verde:   #2EC4B6;
      --laranja: #FF6B35;
      --danger:  #dc3545;
      --blue:    #0d6efd;
      --txt:     #e8eaf0;
      --txt2:    #8892a4;
      --inp:     #1a1f2e;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN ── */
    #tela-login {
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 1.5rem;
    }
    .login-card {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 16px; padding: 2rem 1.5rem; width: 100%; max-width: 380px;
    }
    .login-logo { text-align: center; margin-bottom: 1.5rem; }
    .login-logo img { max-width: 140px; }
    .login-logo h2 { font-size: 1rem; color: var(--txt2); margin-top: .5rem; }
    .erro { color: #ff6b6b; font-size: .85rem; margin-top: .5rem; text-align: center; }

    /* ── INPUTS ── */
    label { display: block; font-size: .8rem; color: var(--txt2); margin-bottom: .35rem; font-weight: 500; }
    input[type=email], input[type=password], input[type=date],
    input[type=text], input[type=number], select {
      width: 100%; background: var(--inp); border: 1px solid var(--borda);
      border-radius: 10px; color: var(--txt); font-size: 1rem;
      padding: .75rem 1rem; margin-bottom: .9rem; outline: none; -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: var(--verde); }
    select option { background: var(--card); }

    /* ── PRINCIPAL ── */
    #tela-principal { display: none; flex-direction: column; height: 100dvh; overflow: hidden; }

    /* ── CABEÇALHO ── */
    #cabecalho {
      background: var(--card); border-bottom: 1px solid var(--borda);
      padding: .6rem 1rem; flex-shrink: 0;
    }
    .cab-topo { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .cab-topo img { height: 28px; }
    .btn-sair {
      background: none; border: 1px solid var(--borda); color: var(--txt2);
      border-radius: 8px; padding: .3rem .7rem; font-size: .78rem; cursor: pointer;
    }
    .local-pills { display: flex; gap: .5rem; margin-bottom: .5rem; }
    .pill {
      flex: 1; text-align: center; padding: .45rem; border-radius: 8px;
      border: 1px solid var(--borda); color: var(--txt2); font-size: .82rem;
      font-weight: 600; cursor: pointer; background: var(--inp); transition: all .15s;
    }
    .pill.ativo { background: var(--verde); border-color: var(--verde); color: #fff; }
    .info-linha {
      display: flex; align-items: center; gap: .5rem;
      font-size: .76rem; color: var(--txt2); margin-bottom: .45rem;
    }
    .info-linha strong { color: var(--txt); }
    .data-inp {
      background: var(--inp); border: 1px solid var(--borda); border-radius: 6px;
      color: var(--txt); font-size: .76rem; padding: .18rem .45rem;
      margin: 0; -webkit-appearance: none; width: auto;
    }
    .data-inp:focus { border-color: var(--verde); outline: none; }
    .sep { color: var(--borda); }
    /* Day selector */
    .dias-wrap {
      display: flex; gap: .3rem; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; padding-bottom: 2px;
    }
    .dias-wrap::-webkit-scrollbar { display: none; }
    .dia-btn {
      flex-shrink: 0; background: var(--inp); border: 1px solid var(--borda);
      border-radius: 7px; color: var(--txt2); font-size: .72rem; font-weight: 700;
      padding: .3rem .55rem; cursor: pointer; transition: all .15s;
    }
    .dia-btn.ativo { background: var(--blue); border-color: var(--blue); color: #fff; }
    .feriado-btn {
      flex-shrink: 0; background: var(--inp); border: 1px solid var(--borda);
      border-radius: 7px; color: var(--txt2); font-size: .72rem; font-weight: 700;
      padding: .3rem .6rem; cursor: pointer; transition: all .15s;
    }
    .feriado-btn.ativo { background: #ffc107; border-color: #ffc107; color: #000; }

    /* ── CONTEÚDO PRINCIPAL ── */
    #conteudo-principal { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── VIEW CONTAGEM ── */
    #view-contagem { display: block; }
    .section-titulo {
      font-size: .7rem; font-weight: 700; color: var(--txt2);
      letter-spacing: .08em; text-transform: uppercase;
      padding: .9rem 1rem .5rem;
    }
    .setor-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: .65rem; padding: 0 1rem 1rem;
    }
    .setor-btn {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 14px; color: var(--txt); font-size: .95rem; font-weight: 600;
      padding: 1.25rem .5rem; cursor: pointer; text-align: center;
      line-height: 1.5; transition: all .15s;
    }
    .setor-btn:active { background: var(--verde); border-color: var(--verde); }

    /* Breadcrumb + grupos */
    .breadcrumb-bar {
      display: flex; align-items: center; gap: .75rem;
      padding: .7rem 1rem; border-bottom: 1px solid var(--borda);
    }
    .btn-voltar {
      background: none; border: none; color: var(--verde);
      font-size: .95rem; font-weight: 700; cursor: pointer; padding: .2rem 0;
    }
    .breadcrumb-setor { font-weight: 700; font-size: .95rem; }
    .grupos-scroll {
      display: flex; gap: .4rem; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; padding: .6rem 1rem;
      border-bottom: 1px solid var(--borda);
    }
    .grupos-scroll::-webkit-scrollbar { display: none; }
    .grupo-chip {
      flex-shrink: 0; padding: .35rem .8rem; border-radius: 20px;
      border: 1px solid var(--borda); background: var(--inp);
      color: var(--txt2); font-size: .78rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .grupo-chip.ativo { background: var(--verde); border-color: var(--verde); color: #fff; }

    /* Tabela de produtos */
    .prod-table {
      width: 100%; border-collapse: collapse; font-size: .82rem;
    }
    .prod-table thead th {
      background: #1a1a2e; color: var(--txt2); font-size: .7rem;
      font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      padding: .5rem .6rem; text-align: center; position: sticky; top: 0; z-index: 2;
    }
    .prod-table thead th:first-child { text-align: left; padding-left: 1rem; }
    .prod-table tbody tr { border-bottom: 1px solid var(--borda); }
    .prod-table tbody td { padding: .45rem .5rem; vertical-align: middle; }
    .prod-table tbody td:first-child { padding-left: 1rem; font-size: .82rem; }
    .td-center { text-align: center; }
    .td-pad { color: var(--txt2); font-size: .8rem; min-width: 38px; }
    .td-ped { color: var(--verde); font-weight: 700; font-size: .9rem; min-width: 38px; }
    .td-ped.zero { color: var(--txt2); }
    .inp-est {
      width: 72px; background: var(--inp); border: 1.5px solid var(--borda);
      border-radius: 8px; color: var(--txt); font-size: 1rem; font-weight: 700;
      text-align: center; padding: .45rem .3rem; -webkit-appearance: none; margin: 0;
    }
    .inp-est:focus { border-color: var(--verde); outline: none; background: #1e3535; }
    .sem-prod { color: #ff6b6b; }
    .vazio { text-align: center; color: var(--txt2); padding: 2.5rem 1rem; font-size: .9rem; }

    /* ── RODAPÉ CONTAGEM ── */
    #rodape-contagem {
      display: flex; gap: .6rem; padding: .65rem 1rem;
      background: var(--bg); border-top: 1px solid var(--borda); flex-shrink: 0;
    }
    .btn-enviar {
      flex: 1; background: var(--verde); color: #fff; border: none;
      border-radius: 12px; font-size: 1rem; font-weight: 700;
      padding: .85rem; cursor: pointer; transition: opacity .15s;
    }
    .btn-enviar:disabled { background: var(--borda); color: var(--txt2); cursor: default; }
    .btn-enviar:not(:disabled):active { opacity: .8; }
    .btn-emerg {
      background: var(--danger); color: #fff; border: none; border-radius: 12px;
      font-size: 1.2rem; padding: .85rem .95rem; cursor: pointer; flex-shrink: 0;
    }
    .btn-emerg:active { opacity: .8; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: flex; background: var(--card);
      border-top: 1px solid var(--borda); flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: .2rem; background: none; border: none;
      color: var(--txt2); font-size: .7rem; font-weight: 600;
      padding: .6rem .5rem; cursor: pointer; transition: color .15s;
    }
    .nav-btn .nav-icon { font-size: 1.4rem; line-height: 1; }
    .nav-btn.ativo { color: var(--verde); }

    /* ── VIEW PEDIDOS ── */
    #view-pedidos { display: none; flex-direction: column; height: 100%; }
    .subtabs {
      display: flex; border-bottom: 1px solid var(--borda); flex-shrink: 0;
    }
    .subtab {
      flex: 1; background: none; border: none; color: var(--txt2);
      font-size: .82rem; font-weight: 600; padding: .75rem .5rem;
      cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s;
    }
    .subtab.ativo { color: var(--verde); border-bottom-color: var(--verde); }
    .subtab-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .filtros-row {
      display: flex; gap: .5rem; padding: .75rem 1rem;
      flex-wrap: wrap; align-items: center;
    }
    .filtros-row select { width: auto; margin: 0; font-size: .8rem; padding: .4rem .6rem; flex: 1; min-width: 100px; }
    .btn-refresh {
      background: var(--inp); border: 1px solid var(--borda); border-radius: 8px;
      color: var(--txt); padding: .4rem .65rem; font-size: .9rem; cursor: pointer;
    }

    /* ── PEDIDO CARDS ── */
    .ped-card {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 12px; margin: .5rem 1rem; overflow: hidden;
    }
    .ped-card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: .65rem .85rem; gap: .5rem;
    }
    .ped-num { font-weight: 700; font-size: .9rem; }
    .ped-info { font-size: .74rem; color: var(--txt2); margin-top: .15rem; }
    .badge-status {
      border-radius: 6px; font-size: .72rem; font-weight: 700;
      padding: .2rem .55rem; white-space: nowrap; display: inline-block; margin-top: .1rem;
    }
    .badge-emerg {
      background: var(--danger); color: #fff; border-radius: 6px;
      font-size: .7rem; font-weight: 700; padding: .15rem .45rem;
      display: inline-block; margin-left: .35rem;
    }
    .ped-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
    .ped-table th {
      background: #1a1a2e; color: var(--txt2); font-size: .68rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      padding: .4rem .6rem;
    }
    .ped-table td { padding: .38rem .6rem; border-top: 1px solid var(--borda); vertical-align: middle; }
    .ped-table th:first-child, .ped-table td:first-child { padding-left: .85rem; }
    .ped-table th:not(:first-child), .ped-table td:not(:first-child) { text-align: center; white-space: nowrap; }
    .btn-liberar, .btn-receber {
      width: calc(100% - 1.7rem); margin: .6rem .85rem; display: block;
      border: none; border-radius: 10px; font-size: .88rem; font-weight: 700;
      padding: .65rem; cursor: pointer; transition: opacity .15s;
    }
    .btn-liberar { background: #198754; color: #fff; }
    .btn-receber { background: var(--blue); color: #fff; }
    .btn-liberar:active, .btn-receber:active { opacity: .8; }

    /* ── MODAIS (bottom sheet) ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.6);
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .modal-sheet {
      background: var(--card); border-radius: 18px 18px 0 0;
      max-height: 85dvh; display: flex; flex-direction: column;
    }
    .modal-handle {
      width: 40px; height: 4px; background: var(--borda);
      border-radius: 2px; margin: .75rem auto .25rem;
    }
    .modal-titulo {
      font-size: 1rem; font-weight: 700; padding: .5rem 1.2rem .9rem;
      border-bottom: 1px solid var(--borda);
    }
    .modal-body-scroll {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 1rem 1.2rem;
    }
    .modal-subtitulo { font-size: .8rem; color: var(--txt2); margin-bottom: .85rem; }
    .modal-footer {
      display: flex; gap: .6rem; padding: .85rem 1.2rem;
      border-top: 1px solid var(--borda);
      padding-bottom: calc(.85rem + env(safe-area-inset-bottom));
    }
    .btn-cancel {
      flex: 1; background: var(--inp); border: 1px solid var(--borda);
      border-radius: 10px; color: var(--txt); font-size: .9rem; font-weight: 600;
      padding: .75rem; cursor: pointer;
    }
    .btn-confirm {
      flex: 2; background: #198754; border: none; border-radius: 10px;
      color: #fff; font-size: .9rem; font-weight: 700; padding: .75rem; cursor: pointer;
    }
    .btn-confirm.blue { background: var(--blue); }
    .btn-confirm.red  { background: var(--danger); }
    .btn-confirm:active, .btn-cancel:active { opacity: .8; }
    .inp-modal {
      width: 80px; background: var(--inp); border: 1.5px solid var(--borda);
      border-radius: 8px; color: var(--txt); font-size: 1rem; font-weight: 700;
      text-align: center; padding: .4rem .3rem; margin: 0; -webkit-appearance: none;
    }
    .inp-modal:focus { border-color: var(--verde); outline: none; }
    .sug-wrap {
      background: var(--inp); border: 1px solid var(--borda);
      border-radius: 10px; overflow: hidden; margin-top: -0.9rem; margin-bottom: .9rem;
      max-height: 160px; overflow-y: auto;
    }
    .sug-item {
      padding: .65rem 1rem; font-size: .88rem; border-bottom: 1px solid var(--borda);
      cursor: pointer;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:active { background: var(--borda); }
    .prod-sel { color: var(--verde); font-size: .82rem; margin-bottom: .85rem; }

    /* ── SPINNER / TOAST ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #toast {
      position: fixed; bottom: 5.5rem; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: .6rem 1.2rem; border-radius: 20px;
      font-size: .88rem; display: none; z-index: 300;
      white-space: nowrap; max-width: 90vw; text-align: center;
    }
    #toast.ok  { background: #198754; }
    #toast.err { background: var(--danger); }

    .btn-cancelar-ped {
      background: none; border: 1px solid var(--danger); border-radius: 8px;
      color: var(--danger); padding: .5rem .9rem; cursor: pointer; font-size: .85rem;
      white-space: nowrap;
    }
    .btn-cancelar-ped:active { background: rgba(220,53,69,.1); }
    .btn-primary-full {
      width: 100%; background: var(--verde); color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600;
      padding: .85rem; cursor: pointer; margin-bottom: 0;
    }
    .btn-primary-full:disabled { opacity: .5; cursor: default; }

    /* ── PIN PAD ── */
    .pin-display {
      display: flex; justify-content: center; gap: .9rem; margin: 1rem 0 .5rem;
    }
    .pin-dot {
      width: 15px; height: 15px; border-radius: 50%;
      border: 2px solid var(--borda); background: transparent; transition: background .1s;
    }
    .pin-dot.cheio { background: var(--verde); border-color: var(--verde); }
    .pin-dot.erro  { background: var(--danger); border-color: var(--danger); }
    .pin-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: .5rem; max-width: 260px; margin: .75rem auto 0;
    }
    .pin-key {
      background: var(--card); border: 1px solid var(--borda); border-radius: 14px;
      color: var(--txt); font-size: 1.5rem; font-weight: 600;
      padding: .9rem; cursor: pointer; text-align: center; transition: background .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .pin-key:active { background: var(--borda); }
    .pin-key.del  { font-size: 1.1rem; color: var(--txt2); }
    .pin-key.ok   { background: var(--verde); color: #fff; border-color: var(--verde); }
    .pin-key.ok:active { opacity: .8; }
    .pin-nome { text-align: center; font-weight: 700; font-size: 1.05rem; margin-bottom: .25rem; }
    .pin-erro { color: var(--danger); text-align: center; font-size: .82rem; min-height: 1.1em; margin-top: .5rem; }
    .pin-cancelar {
      width: 100%; background: none; border: none; color: var(--txt2);
      padding: .9rem; font-size: .9rem; cursor: pointer; margin-top: .25rem;
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="tela-login">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="Tambaqui de Banda">
      <h2>Contagem / Pedido</h2>
    </div>
    <label>E-mail</label>
    <input type="email" id="login-email" placeholder="seu@email.com"
      onkeydown="if(event.key==='Enter') document.getElementById('login-senha').focus()">
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') fazerLogin()">
    <button class="btn-primary-full" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="erro" id="login-erro"></div>
  </div>
</div>

<!-- ══ PRINCIPAL ══ -->
<div id="tela-principal">

  <!-- Cabeçalho -->
  <header id="cabecalho">
    <div class="cab-topo">
      <img src="logo.png" alt="Tambaqui">
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
    <div class="local-pills">
      <div class="pill ativo" id="pill-centro" onclick="selecionarLocal('Centro')">📍 Centro</div>
      <div class="pill" id="pill-p10" onclick="selecionarLocal('P10')">📍 P10</div>
    </div>
    <div class="info-linha">
      <span>📅</span>
      <input type="date" id="data-inv" class="data-inp">
      <span class="sep">|</span>
      <span>👤 <strong id="exibe-resp">—</strong></span>
    </div>
    <div class="dias-wrap">
      <button class="dia-btn" data-dia="seg" onclick="setDia('seg')">SEG</button>
      <button class="dia-btn" data-dia="ter" onclick="setDia('ter')">TER</button>
      <button class="dia-btn" data-dia="qua" onclick="setDia('qua')">QUA</button>
      <button class="dia-btn" data-dia="qui" onclick="setDia('qui')">QUI</button>
      <button class="dia-btn" data-dia="sex" onclick="setDia('sex')">SEX</button>
      <button class="dia-btn" data-dia="sab" onclick="setDia('sab')">SAB</button>
      <button class="dia-btn" data-dia="dom" onclick="setDia('dom')">DOM</button>
      <button class="feriado-btn" id="btn-feriado" onclick="toggleFeriado()">🎉 Feriado</button>
    </div>
  </header>

  <!-- Conteúdo -->
  <div id="conteudo-principal">

    <!-- View: Contagem -->
    <div id="view-contagem">
      <!-- Setor grid -->
      <div id="setor-grid">
        <div class="section-titulo">Selecione o Setor</div>
        <div class="setor-grid">
          <button class="setor-btn" onclick="pedirPinSetor('CHURRASQUEIRA')">🔥<br>Churrasqueira</button>
          <button class="setor-btn" onclick="pedirPinSetor('COZINHA')">🍳<br>Cozinha</button>
          <button class="setor-btn" onclick="pedirPinSetor('BAR')">🍹<br>Bar</button>
          <button class="setor-btn" onclick="pedirPinSetor('SALAO')">🪑<br>Salão</button>
          <button class="setor-btn" onclick="pedirPinSetor('ASG')">🧹<br>ASG</button>
          <button class="setor-btn" onclick="pedirPinSetor('DELIVERY')">🛵<br>Delivery</button>
          <button class="setor-btn" onclick="pedirPinSetor('ESTOQUE DA LOJA')" style="grid-column:1/-1;background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4)">🏪<br>Estoque da Loja</button>
        </div>
      </div>

      <!-- Grupos + Produtos -->
      <div id="grupos-produtos" style="display:none">
        <div class="breadcrumb-bar">
          <button class="btn-voltar" onclick="voltarSetores()">‹ Setores</button>
          <span class="breadcrumb-setor" id="breadcrumb-setor"></span>
        </div>
        <div class="grupos-scroll" id="grupos-scroll"></div>
        <div id="lista-produtos">

// Gera o setor "ESTOQUE DA LOJA" mesclando todos os setores, deduplicando por grupo
(function() {
  const _n = s => String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
  const forceMerge = { 'material expediente': 'MATERIAL DE EXPEDIENTE' };
  const result = {}, seen = {}, normToCanonical = {};
  Object.values(INVENTARIO_ESTRUTURA).forEach(setorGrupos => {
    Object.entries(setorGrupos).forEach(([grupo, prods]) => {
      const ng = _n(grupo);
      const canonical = forceMerge[ng] || normToCanonical[ng] || grupo;
      if (!normToCanonical[ng]) normToCanonical[ng] = canonical;
      if (!result[canonical]) { result[canonical] = []; seen[canonical] = new Set(); }
      prods.forEach(p => { const np = _n(p); if (!seen[canonical].has(np)) { result[canonical].push(p); seen[canonical].add(np); } });
    });
  });
  INVENTARIO_ESTRUTURA['ESTOQUE DA LOJA'] = result;
})();

// ─── HELPERS ─────────────────────────────────────────────────────
function norm(s) { return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase(); }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getPadrao(nome) {
  const entry = _padroes[nome.trim().toUpperCase()];
  if (entry === undefined || entry === null) return null;
  if (typeof entry === 'number') return entry;
  const chave = _feriado ? 'feriado' : _dia;
  const val   = entry[chave];
  return val !== undefined ? Number(val) : null;
}

function toast(msg, tipo) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = tipo === 'ok' ? 'ok' : 'err';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3500);
}
function mostrarModal(id) { document.getElementById(id).style.display = 'flex'; }
function fecharModal(id)  { document.getElementById(id).style.display = 'none'; }
function fecharSePano(e, id) { if (e.target.id === id) fecharModal(id); }

// ─── INIT ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  sb   = supabase.createClient(SB_URL, SB_KEY);
  _dia = DIAS_SEM[new Date().getDay()];
  document.getElementById('data-inv').value = new Date().toISOString().slice(0, 10);
  atualizarBtnsDia();
  const { data: { session } } = await sb.auth.getSession();
  if (session) { user = session.user; entrar(); }
});

// ─── AUTH ────────────────────────────────────────────────────────
async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha  = document.getElementById('login-senha').value;
  const btn    = document.getElementById('btn-login');
  const erro   = document.getElementById('login-erro');
  if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...'; erro.textContent = '';
  if (!sb) sb = supabase.createClient(SB_URL, SB_KEY);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
  if (error) {
    erro.textContent = 'E-mail ou senha incorretos.';
    btn.disabled = false; btn.textContent = 'Entrar'; return;
  }
  user = data.user;
  entrar();
}

async function entrar() {
  document.getElementById('tela-login').style.display    = 'none';
  document.getElementById('tela-principal').style.display = 'flex';
  const nome = (user?.user_metadata?.nome || user?.email?.split('@')[0] || '').trim();
  document.getElementById('exibe-resp').textContent = nome;
  await Promise.all([carregarProdutos(), carregarMapeamentos()]);
}

async function carregarMapeamentos() {
  const { data } = await sb.from('inv_configuracoes')
    .select('chave,valor').in('chave', ['mapeamentos','excluidos','pins','adicoes','padroes']);
  if (data) {
    data.forEach(row => {
      if (row.chave === 'mapeamentos') _mapeamentos = row.valor || {};
      if (row.chave === 'excluidos')   _excluidos   = new Set(row.valor || []);
      if (row.chave === 'pins')        _pins        = row.valor || {};
      if (row.chave === 'adicoes')     _invAdicoes  = row.valor || {};
      if (row.chave === 'padroes')     _padroes     = row.valor || {};
    });
  }
}

async function sair() { await sb.auth.signOut(); location.reload(); }

// ─── LOCAL ───────────────────────────────────────────────────────
function selecionarLocal(l) {
  _local = l;
  document.getElementById('pill-centro').className = 'pill' + (l === 'Centro' ? ' ativo' : '');
  document.getElementById('pill-p10').className    = 'pill' + (l === 'P10'    ? ' ativo' : '');
}

// ─── DIA ─────────────────────────────────────────────────────────
function setDia(dia) {
  _dia = dia; _feriado = false; atualizarBtnsDia();
  if (_grupo) renderProdutos();
}
function toggleFeriado() {
  _feriado = !_feriado; atualizarBtnsDia();
  if (_grupo) renderProdutos();
}
function atualizarBtnsDia() {
  DIAS_SEM.forEach(d => {
    const btn = document.querySelector(`[data-dia="${d}"]`);
    if (btn) btn.className = 'dia-btn' + (d === _dia && !_feriado ? ' ativo' : '');
  });
  const btnF = document.getElementById('btn-feriado');
  if (btnF) btnF.className = 'feriado-btn' + (_feriado ? ' ativo' : '');
}

// ─── PRODUTOS ────────────────────────────────────────────────────
async function carregarProdutos() {
  let todos = [], pag = 0;
  while (true) {
    const { data } = await sb.from('est_produtos').select('id,nome')
      .eq('ativo', true).range(pag * 1000, pag * 1000 + 999);
    if (!data?.length) break;
    todos = todos.concat(data);
    if (data.length < 1000) break;
    pag++;
  }
  _todosProdutos = todos;
}

// ─── NAVEGAÇÃO PRINCIPAL ─────────────────────────────────────────
function showMainTab(tab) {
  document.getElementById('view-contagem').style.display   = tab === 'contagem' ? 'block' : 'none';
  document.getElementById('view-pedidos').style.display    = tab === 'pedidos'  ? 'flex'  : 'none';
  document.getElementById('rodape-contagem').style.display = tab === 'contagem' ? 'flex'  : 'none';
  document.getElementById('nav-contagem').className = 'nav-btn' + (tab === 'contagem' ? ' ativo' : '');
  document.getElementById('nav-pedidos').className  = 'nav-btn' + (tab === 'pedidos'  ? ' ativo' : '');
  if (tab === 'pedidos') showSubTab('meus');
}
function showSubTab(tab) {
  if (tab === 'estoque') { pedirPinEstoque(); return; }
  document.getElementById('subtab-content-estoque').style.display = 'none';
  document.getElementById('subtab-content-meus').style.display    = 'block';
  document.getElementById('subtab-estoque').className = 'subtab';
  document.getElementById('subtab-meus').className    = 'subtab ativo';
  carregarMeusPedidos();
}
function _abrirSubTabEstoque() {
  document.getElementById('subtab-content-estoque').style.display = 'block';
  document.getElementById('subtab-content-meus').style.display    = 'none';
  document.getElementById('subtab-estoque').className = 'subtab ativo';
  document.getElementById('subtab-meus').className    = 'subtab';

// ─── PIN ─────────────────────────────────────────────────────────
function pedirPinSetor(setor) {
  const pin = _pins[setor];
  if (!pin) { _pedirNomeParaSetor(setor); return; }
  _pinTarget = { tipo: 'setor', setor };
  _pinBuffer = '';
  document.getElementById('pin-nome-setor').textContent = `🔐 ${setor.charAt(0) + setor.slice(1).toLowerCase()}`;
  document.getElementById('pin-erro').textContent = '';
  atualizarPinDisplay();
  mostrarModal('modal-pin');
}
function pedirPinEstoque() {
  if (_estoqueDesbloqueado) { _abrirSubTabEstoque(); return; }
  const pin = _pins['ESTOQUE'];
  if (!pin) { _abrirSubTabEstoque(); return; }
  _pinTarget = { tipo: 'estoque' };
  _pinBuffer = '';
  document.getElementById('pin-nome-setor').textContent = '🔐 Pedidos dos Setores';
  document.getElementById('pin-erro').textContent = '';
  atualizarPinDisplay();
  mostrarModal('modal-pin');
}
function pinKey(d) {
  if (_pinBuffer.length >= 4) return;
  _pinBuffer += d;
  atualizarPinDisplay();
  if (_pinBuffer.length === 4) setTimeout(pinConfirm, 80);
}
function pinDel() {
  _pinBuffer = _pinBuffer.slice(0, -1);
  atualizarPinDisplay();
}
function atualizarPinDisplay() {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('pd' + i);
    el.className = 'pin-dot' + (i < _pinBuffer.length ? ' cheio' : '');
  }
}
function pinConfirm() {
  if (!_pinTarget) return;
  const esperado = _pinTarget.tipo === 'setor'
    ? _pins[_pinTarget.setor]
    : _pins['ESTOQUE'];
  if (_pinBuffer === esperado) {
    fecharModal('modal-pin');
    if (_pinTarget.tipo === 'setor') {
      _pedirNomeParaSetor(_pinTarget.setor);
    } else {
      _estoqueDesbloqueado = true;
      _abrirSubTabEstoque();
    }
    _pinTarget = null; _pinBuffer = '';
  } else {
    document.getElementById('pin-erro').textContent = 'PIN incorreto. Tente novamente.';
    for (let i = 0; i < 4; i++) {
      const el = document.getElementById('pd' + i);
      el.className = 'pin-dot erro';
    }
    _pinBuffer = '';
    setTimeout(() => {
      document.getElementById('pin-erro').textContent = '';
      atualizarPinDisplay();
    }, 900);
  }
}

function _pedirNomeParaSetor(setor) {
  _nomeSetor = setor;
  document.getElementById('nome-setor-label').textContent =
    `👤 ${setor.charAt(0) + setor.slice(1).toLowerCase()}`;
  const inp = document.getElementById('inp-nome-resp');
  inp.value = _nomeResponsavel || '';
  inp.style.borderColor = '';
  mostrarModal('modal-nome');
  setTimeout(() => inp.focus(), 350);
}

function confirmarNome() {
  const nome = (document.getElementById('inp-nome-resp')?.value || '').trim();
  if (!nome) {
    document.getElementById('inp-nome-resp').style.borderColor = '#ef4444';
    return;
  }
  _nomeResponsavel = nome;
  fecharModal('modal-nome');
  selecionarSetor(_nomeSetor);
}

// ─── SETOR / GRUPO ───────────────────────────────────────────────
async function selecionarSetor(setor) {

  _setor = setor; _grupo = null; _grupoProds = [];
  document.getElementById('setor-grid').style.display      = 'none';
  document.getElementById('grupos-produtos').style.display = 'block';
  document.getElementById('breadcrumb-setor').textContent  = setor;
  document.getElementById('btn-enviar').disabled = true;
  renderGrupos();
}
function voltarSetores() {
  _setor = null; _grupo = null; _grupoProds = [];
  document.getElementById('setor-grid').style.display      = 'block';
  document.getElementById('grupos-produtos').style.display = 'none';
  document.getElementById('btn-enviar').disabled = true;
}
function renderGrupos() {
  const grupos = Object.keys(INVENTARIO_ESTRUTURA[_setor] || {});
  document.getElementById('grupos-scroll').innerHTML = grupos.map(g =>
    `<button class="grupo-chip${g === _grupo ? ' ativo' : ''}"
      onclick="selecionarGrupo('${g.replace(/'/g, "\\'")}')">${esc(g)}</button>`
  ).join('');
  if (_grupo) {
    renderProdutos();
  } else {
    document.getElementById('lista-produtos').innerHTML = '<div class="vazio">Selecione um grupo acima.</div>';
  }
}
async function selecionarGrupo(grupo) {
  const hoje = new Date().toISOString().slice(0, 10);
  const data = document.getElementById('data-inv')?.value || hoje;
  const { data: pedHoje } = await sb.from('pedidos_internos')
    .select('num_pedido').eq('data', data).eq('setor', _setor).eq('obs', grupo)
    .neq('status', 'cancelado').limit(1);
  if (pedHoje?.length) {
    toast(`Pedido de ${_setor} / ${grupo} já enviado hoje: ${pedHoje[0].num_pedido}`, 'err');
    return;
  }

  _grupo = grupo;
  renderGrupos();
  const nomes = INVENTARIO_ESTRUTURA[_setor]?.[grupo] || [];
  _grupoProds = nomes
    .filter(nome => !_excluidos.has(nome))
    .map(nome => {
      const nomeReal = _mapeamentos[nome] || nome;
      const prod = _todosProdutos.find(p => norm(p.nome) === norm(nomeReal));
      return { nome, produto_id: prod?.id || null };
    });

  // Adições manuais do setor atual
  const nomesExistentes = new Set(_grupoProds.map(p => norm(p.nome)));
  const _addDe = (chave) => {
    (_invAdicoes[chave] || []).forEach(nome => {
      if (nomesExistentes.has(norm(nome))) return;
      const prod = _todosProdutos.find(p => norm(p.nome) === norm(nome));
      _grupoProds.push({ nome, produto_id: prod?.id || null });
      nomesExistentes.add(norm(nome));
    });
  };

  if (_setor === 'ESTOQUE DA LOJA') {
    // Agrega adições de todos os setores reais que têm este grupo
    Object.keys(INVENTARIO_ESTRUTURA).forEach(s => {
      if (s === 'ESTOQUE DA LOJA') return;
      if (INVENTARIO_ESTRUTURA[s]?.[grupo]) _addDe(`${s}|${grupo}`);
    });
  } else {
    _addDe(`${_setor}|${grupo}`);
  }

  renderProdutos();
  document.getElementById('btn-enviar').disabled = false;
}

function renderProdutos() {
  const el   = document.getElementById('lista-produtos');
  const isEL = _setor === 'ESTOQUE DA LOJA';
  if (!_grupoProds.length) {
    el.innerHTML = '<div class="vazio">Nenhum produto neste grupo.</div>';
    return;
  }
  const linhas = _grupoProds.map((p, i) => {
    const pad    = getPadrao(p.nome);
    const padTxt = pad !== null ? pad : '—';
    const pedIni = pad !== null ? Math.max(0, pad - 0) : '—';
    const semProd = !p.produto_id ? ' class="sem-prod"' : '';
    return `<tr>
      <td${semProd}>${esc(p.nome)}${!p.produto_id ? ' ⚠️' : ''}</td>
      ${isEL ? '' : `<td class="td-center td-pad">${padTxt}</td>`}
      <td class="td-center">
        <input type="number" class="inp-est" id="est-${i}"
          min="0" step="1" value="0" inputmode="decimal"
          oninput="calcPedido(${i})">
      </td>
      ${isEL ? '' : `<td class="td-center td-ped${pedIni === 0 ? ' zero' : ''}" id="ped-${i}">${pedIni}</td>`}
    </tr>`;
  }).join('');
  el.innerHTML = `<table class="prod-table">
    <thead><tr>
      <th>Produto</th>
      ${isEL ? '' : '<th class="td-center">Pad.</th>'}
      <th class="td-center">Estoque</th>
      ${isEL ? '' : '<th class="td-center">Pedido</th>'}
    </tr></thead>
    <tbody>${linhas}</tbody>
  </table>`;
}

function parseQtd(v) { return parseFloat(String(v ?? '').replace(',', '.')) || 0; }

function calcPedido(i) {
  const est    = parseQtd(document.getElementById(`est-${i}`)?.value);
  const padrao = getPadrao(_grupoProds[i]?.nome);
  const el     = document.getElementById(`ped-${i}`);
  if (!el) return;
  if (padrao === null) { el.textContent = '—'; el.className = 'td-center td-ped zero'; return; }
  const ped = Math.max(0, padrao - est);
  el.textContent = ped % 1 === 0 ? String(ped) : ped.toFixed(3).replace(/\.?0+$/, '');
  el.className   = 'td-center td-ped' + (ped === 0 ? ' zero' : '');
}

// ─── ENVIAR PEDIDO ───────────────────────────────────────────────
async function enviarPedido() {
  if (!_setor || !_grupo) { toast('Selecione setor e grupo.', 'err'); return; }
  const data = document.getElementById('data-inv').value;
  if (!data) { toast('Selecione a data.', 'err'); return; }

  const { data: pedHoje } = await sb.from('pedidos_internos')
    .select('num_pedido').eq('data', data).eq('setor', _setor).eq('obs', _grupo)
    .neq('status', 'cancelado').limit(1);
  if (pedHoje?.length) {
    toast(`Pedido de ${_setor} / ${_grupo} já enviado hoje: ${pedHoje[0].num_pedido}`, 'err'); return;
  }

  const resp = _nomeResponsavel || (user?.user_metadata?.nome || user?.email?.split('@')[0] || '').trim();
  const btn  = document.getElementById('btn-enviar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const itensCont = _grupoProds.map((p, i) => {
    const estoque       = parseQtd(document.getElementById(`est-${i}`)?.value);
    const pedido_padrao = getPadrao(p.nome) ?? 0;
    const pedido        = Math.max(0, pedido_padrao - estoque);
    return { produto_id: p.produto_id||null, nome: p.nome, estoque, pedido_padrao, pedido,
             cozinha_bar:0, outros:0, total:estoque, unidade:'UN', valor_unitario:0, soma_total:0 };
  });
  const totalPedido = itensCont.reduce((s, it) => s + it.pedido, 0);

  // Salvar contagem
  const { data: ultInvs } = await sb.from('est_inventarios').select('num_inv').order('criado_em',{ascending:false}).limit(1);
  const ultNum  = ultInvs?.[0]?.num_inv ? parseInt(ultInvs[0].num_inv.replace(/\D/g,''))||0 : 0;
  const num_inv = 'INV-' + String(ultNum+1).padStart(4,'0');

  const { data: inv, error: eInv } = await sb.from('est_inventarios').insert([{
    num_inv, data, local:_local, responsavel:resp, setor:_setor, grupo:_grupo, total_geral:totalPedido,
  }]).select().single();

  if (eInv) { toast('Erro: '+eInv.message,'err'); btn.disabled=false; btn.textContent='📤 Enviar Pedido'; return; }
  await sb.from('est_inventario_itens').insert(itensCont.map(it => ({...it, inventario_id:inv.id})));

  // Criar pedido interno
  const itensPed = itensCont.filter(it => it.pedido > 0)
    .map(it => ({ produto_id:it.produto_id, nome:it.nome, qtd_pedida:it.pedido }));

  if (!itensPed.length) {
    toast(`${num_inv} salvo! Nenhum item a pedir.`, 'ok');
    limparCampos(); btn.disabled=false; btn.textContent='📤 Enviar Pedido'; return;
  }

  const { data: ultPeds } = await sb.from('pedidos_internos').select('num_pedido').order('criado_em',{ascending:false}).limit(1);
  const ultNumP    = ultPeds?.[0]?.num_pedido ? parseInt(ultPeds[0].num_pedido.replace(/\D/g,''))||0 : 0;
  const num_pedido = 'PED-' + String(ultNumP+1).padStart(4,'0');

  const { data: ped, error: ePed } = await sb.from('pedidos_internos').insert({
    num_pedido, data, dia_semana:_feriado?'feriado':_dia,
    setor:_setor, local:_local, tipo:'normal', status:'pendente', responsavel:resp, obs:_grupo,
  }).select().single();
  if (!ePed) await sb.from('pedidos_internos_itens').insert(itensPed.map(it => ({...it, pedido_id:ped.id})));

  toast(`${num_inv} salvo + ${num_pedido} enviado (${itensPed.length} item(s))! ✅`, 'ok');
  limparCampos(); btn.disabled=false; btn.textContent='📤 Enviar Pedido';
}

function limparCampos() {
  _grupoProds.forEach((_, i) => {
    const el = document.getElementById(`est-${i}`);
    if (el) el.value = '0';
    calcPedido(i);
  });
}

// ─── PEDIDOS DOS SETORES ─────────────────────────────────────────
async function carregarPedidosEstoque() {
  const status = document.getElementById('fil-ped-status')?.value || '';
  const setor  = document.getElementById('fil-ped-setor')?.value  || '';
  let q = sb.from('pedidos_internos').select('*').order('criado_em',{ascending:false}).limit(80);
  if (status) q = q.eq('status', status);
  if (setor)  q = q.eq('setor', setor);
  const { data: peds } = await q;
  const el = document.getElementById('lst-pedidos-estoque');
  if (!peds?.length) { el.innerHTML='<div class="vazio">Nenhum pedido.</div>'; return; }
  const { data: itens } = await sb.from('pedidos_internos_itens').select('*').in('pedido_id', peds.map(p=>p.id));
  el.innerHTML = peds.map(ped => _cardPedEstoque(ped, (itens||[]).filter(it=>it.pedido_id===ped.id))).join('');
}

function _cardPedEstoque(ped, its) {
  const cor  = STATUS_COR[ped.status] || '#6c757d';
  const txt  = STATUS_TXT[ped.status] || ped.status;
  const tipo = ped.tipo==='emergencia' ? '<span class="badge-emerg">🚨 Emergência</span>' : '';
  const rows = its.map(it=>`<tr><td>${esc(it.nome)}</td><td>${it.qtd_pedida??'—'}</td><td>${it.qtd_liberada??'—'}</td></tr>`).join('');
  return `<div class="ped-card">
    <div class="ped-card-header">
      <div>
        <span class="ped-num">${esc(ped.num_pedido||'—')}</span>${tipo}
        <div class="ped-info">${ped.data} · ${esc(ped.setor)} · ${esc(ped.local||'')}${ped.obs?' · '+esc(ped.obs):''}</div>
      </div>
      <span class="badge-status" style="background:${cor};color:${ped.status==='pendente'?'#000':'#fff'}">${txt}</span>
    </div>
    <table class="ped-table"><thead><tr><th>Produto</th><th>Ped.</th><th>Lib.</th></tr></thead><tbody>${rows}</tbody></table>
    ${ped.status==='pendente'?`<div style="display:flex;gap:.5rem;padding:.5rem .75rem .75rem">
      <button class="btn-liberar" style="flex:1" onclick="abrirLiberarPedido('${ped.id}')">📦 Liberar Pedido</button>
      <button class="btn-cancelar-ped" onclick="cancelarPedidoInterno('${ped.id}','${esc(ped.num_pedido)}')">🗑️ Cancelar</button>
    </div>`:''}
  </div>`;
}

// ─── MEUS PEDIDOS ────────────────────────────────────────────────

  el.innerHTML = peds.map(ped => _cardMeusPedidos(ped, (itens||[]).filter(it=>it.pedido_id===ped.id))).join('');

function _cardMeusPedidos(ped, its) {
  const cor  = STATUS_COR[ped.status] || '#6c757d';
  const txt  = STATUS_TXT[ped.status] || ped.status;
  const tipo = ped.tipo==='emergencia' ? '<span class="badge-emerg">🚨 Emergência</span>' : '';
  const rows = its.map(it=>`<tr><td>${esc(it.nome)}</td><td>${it.qtd_pedida??'—'}</td><td>${it.qtd_liberada??'—'}</td><td>${it.qtd_recebida??'—'}</td></tr>`).join('');
  return `<div class="ped-card">
    <div class="ped-card-header">
      <div>
        <span class="ped-num">${esc(ped.num_pedido||'—')}</span>${tipo}
        <div class="ped-info">${ped.data}</div>
      </div>
      <span class="badge-status" style="background:${cor};color:${ped.status==='pendente'?'#000':'#fff'}">${txt}</span>
    </div>
    <table class="ped-table"><thead><tr><th>Produto</th><th>Ped.</th><th>Lib.</th><th>Rec.</th></tr></thead><tbody>${rows}</tbody></table>
    ${ped.status==='liberado'?`<button class="btn-receber" onclick="abrirReceberPedido('${ped.id}')">✅ Confirmar Recebimento</button>`:''}
  </div>`;
}

// ─── MODAL LIBERAR ───────────────────────────────────────────────
async function abrirLiberarPedido(id) {
  _pedLiberarId = id;
  const { data: ped   } = await sb.from('pedidos_internos').select('*').eq('id',id).single();
  const { data: itens } = await sb.from('pedidos_internos_itens').select('*').eq('pedido_id',id);
  const rows = (itens||[]).map(it=>`<tr>
    <td>${esc(it.nome)}</td><td>${it.qtd_pedida??'—'}</td>
    <td><input type="number" class="inp-modal" id="lib-${it.id}" value="${it.qtd_pedida??0}" min="0" step="1" inputmode="decimal"></td>
  </tr>`).join('');
  document.getElementById('modal-liberar-body').innerHTML = `
    <div class="modal-subtitulo">${esc(ped?.num_pedido||'—')} · ${esc(ped?.setor||'')} · ${ped?.data||''}${ped?.obs?' · '+esc(ped.obs):''}</div>
    <table class="ped-table" style="margin-bottom:.75rem">
      <thead><tr><th>Produto</th><th>Pedido</th><th>Liberar</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <input type="hidden" id="lib-itens" value='${JSON.stringify((itens||[]).map(i=>i.id))}'>`;
  mostrarModal('modal-liberar');
}
async function confirmarLiberacao() {
  if (!_pedLiberarId) return;
  const ids = JSON.parse(document.getElementById('lib-itens')?.value||'[]');
  await Promise.all(ids.map(id => {
    const qtd = parseQtd(document.getElementById(`lib-${id}`)?.value);
    return sb.from('pedidos_internos_itens').update({qtd_liberada:qtd}).eq('id',id);
  }));
  await sb.from('pedidos_internos').update({status:'liberado',liberado_em:new Date().toISOString()}).eq('id',_pedLiberarId);
  fecharModal('modal-liberar');
  toast('Pedido liberado! ✅','ok');
  carregarPedidosEstoque();
}

async function cancelarPedidoInterno(id, num) {
  if (!confirm(`Cancelar pedido ${num}?\n\nO setor poderá enviar um novo pedido hoje.`)) return;
  const { error } = await sb.from('pedidos_internos')
    .update({ status: 'cancelado' }).eq('id', id).eq('status', 'pendente');
  if (error) { toast('Erro ao cancelar: ' + error.message, 'err'); return; }
  toast(`${num} cancelado.`, 'ok');
  carregarPedidosEstoque();
}

// ─── EMERGÊNCIA ──────────────────────────────────────────────────
function abrirEmergencia() {
  if (_setor) document.getElementById('emerg-setor').value = _setor;
  document.getElementById('emerg-busca').value = '';
  document.getElementById('emerg-prod-id').value = '';
  document.getElementById('emerg-sugestoes').innerHTML = '';
  document.getElementById('emerg-sugestoes').style.display = 'none';
  document.getElementById('emerg-prod-sel').style.display  = 'none';
  document.getElementById('emerg-qtd').value = '';
  document.getElementById('emerg-obs').value = '';
  const resp = _nomeResponsavel || (user?.user_metadata?.nome || user?.email?.split('@')[0] || '').trim();
  document.getElementById('emerg-resp').value = resp;
  mostrarModal('modal-emerg');
}
function buscarEmerg() {
  const q  = (document.getElementById('emerg-busca')?.value||'').trim().toLowerCase();
  const el = document.getElementById('emerg-sugestoes');
  if (q.length < 2) { el.style.display='none'; el.innerHTML=''; return; }
  const hits = _todosProdutos.filter(p => p.nome.toLowerCase().includes(q)).slice(0, 8);
  if (!hits.length) { el.innerHTML='<div class="sug-item">Nenhum produto encontrado.</div>'; el.style.display='block'; return; }
  el.innerHTML = hits.map(p=>`<div class="sug-item" onclick="selProdEmerg('${p.id}','${esc(p.nome)}')">${esc(p.nome)}</div>`).join('');
  el.style.display = 'block';
}
function selProdEmerg(id, nome) {
  document.getElementById('emerg-prod-id').value  = id;
  document.getElementById('emerg-busca').value    = nome;
  document.getElementById('emerg-sugestoes').style.display = 'none';
  const el = document.getElementById('emerg-prod-sel');
  el.textContent    = '✅ ' + nome;
  el.style.display  = 'block';
}
async function enviarEmergencia() {
  const setor    = document.getElementById('emerg-setor')?.value?.trim();
  const prodId   = document.getElementById('emerg-prod-id')?.value?.trim();
  const prodNome = document.getElementById('emerg-busca')?.value?.trim();
  const qtd      = parseQtd(document.getElementById('emerg-qtd')?.value);
  const resp     = (document.getElementById('emerg-resp')?.value||'').trim();
  const obs      = (document.getElementById('emerg-obs')?.value||'').trim();
  if (!setor)    { toast('Selecione o setor.','err');    return; }
  if (!prodNome) { toast('Selecione um produto.','err'); return; }
  if (qtd <= 0)  { toast('Informe a quantidade.','err'); return; }
  const data = new Date().toISOString().slice(0,10);
  const { data: ultPeds } = await sb.from('pedidos_internos').select('num_pedido').order('criado_em',{ascending:false}).limit(1);
  const ultN = ultPeds?.[0]?.num_pedido ? parseInt(ultPeds[0].num_pedido.replace(/\D/g,''))||0 : 0;
  const num_pedido = 'PED-' + String(ultN+1).padStart(4,'0');
  const { data: ped, error: e1 } = await sb.from('pedidos_internos').insert({
    num_pedido, data, dia_semana:_feriado?'feriado':_dia,
    setor, local:_local, tipo:'emergencia', status:'pendente', responsavel:resp, obs,
  }).select().single();
  if (e1) { toast('Erro: '+e1.message,'err'); return; }
  await sb.from('pedidos_internos_itens').insert({ pedido_id:ped.id, produto_id:prodId||null, nome:prodNome, qtd_pedida:qtd });
  fecharModal('modal-emerg');
  toast(`${num_pedido} (emergência) enviado! ✅`,'ok');
}
</script>
